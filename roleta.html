<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roleta de Cassino Pro</title>
    <style>
        :root {
            --felt-green: #014626;
            --gold: #d4af37;
            --red: #c90b0b;
            --black: #1a1a1a;
            --white: #f0f0f0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #050505;
            color: var(--white);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        h1 {
            color: var(--gold);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px;
            text-shadow: 0 0 10px rgba(212, 175, 55, 0.3);
        }

        /* Container Principal */
        .game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: #0a0a0a;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
            border: 1px solid #333;
            max-width: 800px;
            width: 100%;
        }

        /* A Roda da Roleta */
        .wheel-wrapper {
            position: relative;
            width: 300px;
            height: 300px;
            margin: 20px 0;
            border-radius: 50%;
            border: 10px solid #222;
            box-shadow: 0 0 20px rgba(0,0,0,0.5), inset 0 0 20px rgba(0,0,0,0.8);
            overflow: hidden;
        }

        .wheel {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            position: relative;
            transition: transform 5s cubic-bezier(0.1, 0.8, 0.1, 1); /* Curva de desaceleração */
        }

        /* Marcador (Seta) */
        .marker {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-top: 25px solid var(--gold);
            z-index: 10;
            filter: drop-shadow(0 2px 2px rgba(0,0,0,0.5));
        }

        /* Estilo dos Números na Roda */
        .number {
            position: absolute;
            width: 30px;
            height: 150px; /* Metade do diâmetro */
            left: 135px; /* (300/2) - (30/2) */
            top: 0;
            transform-origin: 50% 100%;
            text-align: center;
            padding-top: 5px;
            font-size: 14px;
            font-weight: bold;
            color: white;
            clip-path: polygon(0 0, 100% 0, 50% 100%);
        }

        /* Painel de Controle */
        .controls {
            background-color: var(--felt-green);
            padding: 20px;
            border-radius: 10px;
            width: 100%;
            box-sizing: border-box;
            border: 4px solid #362615;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.6);
        }

        .stats-bar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            font-size: 1.2rem;
            font-weight: bold;
        }

        .balance { color: var(--gold); }
        
        .bet-area {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
        }

        label {
            margin-bottom: 5px;
            font-size: 0.9rem;
            color: #ddd;
        }

        input, select {
            padding: 10px;
            border-radius: 5px;
            border: none;
            background: rgba(0,0,0,0.3);
            color: white;
            font-size: 1rem;
        }

        button.spin-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(to bottom, #d4af37, #aa8c2c);
            border: none;
            border-radius: 5px;
            font-size: 1.2rem;
            font-weight: bold;
            color: #222;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 5px 0 #886f20;
            transition: transform 0.1s, box-shadow 0.1s;
        }

        button.spin-btn:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #886f20;
        }

        button:disabled {
            background: #555;
            box-shadow: none;
            cursor: not-allowed;
            color: #888;
        }

        /* Histórico e Mensagens */
        .message {
            margin-top: 15px;
            font-size: 1.2rem;
            height: 30px;
            text-align: center;
        }

        .last-results {
            margin-top: 10px;
            display: flex;
            gap: 5px;
            justify-content: center;
        }

        .result-badge {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            font-weight: bold;
            border: 1px solid white;
        }

        .green { background-color: #008000; }
        .red { background-color: var(--red); }
        .black { background-color: var(--black); }

    </style>
</head>
<body>

    <h1>Cassino Royal</h1>

    <div class="game-container">
        <div class="wheel-wrapper">
            <div class="marker"></div>
            <div class="wheel" id="wheel">
                </div>
        </div>

        <div class="controls">
            <div class="stats-bar">
                <span>Saldo: <span class="balance" id="balanceDisplay">R$ 1000.00</span></span>
                <span>Aposta: <span id="currentBetDisplay">R$ 0.00</span></span>
            </div>

            <div class="bet-area">
                <div class="input-group">
                    <label>Valor da Aposta (R$)</label>
                    <input type="number" id="betAmount" min="1" value="50">
                </div>

                <div class="input-group">
                    <label>Tipo de Aposta</label>
                    <select id="betType" onchange="toggleNumberInput()">
                        <option value="color_red">Cor: Vermelho (2x)</option>
                        <option value="color_black">Cor: Preto (2x)</option>
                        <option value="number">Número Exato (35x)</option>
                        <option value="even">Par (2x)</option>
                        <option value="odd">Ímpar (2x)</option>
                    </select>
                </div>

                <div class="input-group" id="specificNumberGroup" style="display: none;">
                    <label>Escolha o Número (0-36)</label>
                    <input type="number" id="betNumber" min="0" max="36" value="0">
                </div>
            </div>

            <button class="spin-btn" id="spinBtn" onclick="spinWheel()">GIRAR A ROLETA</button>

            <div class="message" id="message">Faça sua aposta...</div>
            
            <div style="text-align: center; margin-top: 10px; font-size: 0.9rem; color: #aaa;">Últimos Resultados:</div>
            <div class="last-results" id="history"></div>
        </div>
    </div>

    <script>
        // Ordem oficial da Roleta Europeia
        const wheelNumbers = [0, 32, 15, 19, 4, 21, 2, 25, 17, 34, 6, 27, 13, 36, 11, 30, 8, 23, 10, 5, 24, 16, 33, 1, 20, 14, 31, 9, 22, 18, 29, 7, 28, 12, 35, 3, 26];
        
        // Cores
        const redNumbers = [32, 19, 21, 25, 34, 27, 36, 30, 23, 5, 16, 1, 14, 9, 18, 7, 12, 3];
        // O restante (exceto 0) é preto. 0 é verde.

        let balance = 1000;
        let isSpinning = false;
        let currentRotation = 0;

        const wheelElement = document.getElementById('wheel');
        const sliceAngle = 360 / wheelNumbers.length; // 37 números = ~9.72 graus

        // Inicialização: Desenhar a roda
        function drawWheel() {
            wheelNumbers.forEach((num, index) => {
                const slice = document.createElement('div');
                slice.className = 'number';
                
                // Determinar cor
                if (num === 0) slice.style.backgroundColor = '#008000';
                else if (redNumbers.includes(num)) slice.style.backgroundColor = '#c90b0b';
                else slice.style.backgroundColor = '#1a1a1a';

                // Rotacionar cada fatia
                slice.style.transform = `rotate(${index * sliceAngle}deg)`;
                
                // Texto
                slice.innerHTML = `<span style="display:block; transform: rotate(180deg); padding-top:5px;">${num}</span>`;
                
                wheelElement.appendChild(slice);
            });
        }

        // Lógica de UI para esconder/mostrar input de número específico
        function toggleNumberInput() {
            const type = document.getElementById('betType').value;
            const group = document.getElementById('specificNumberGroup');
            group.style.display = type === 'number' ? 'flex' : 'none';
        }

        // Função de Girar
        function spinWheel() {
            if (isSpinning) return;

            const betAmount = parseFloat(document.getElementById('betAmount').value);
            const betType = document.getElementById('betType').value;
            const betNumber = parseInt(document.getElementById('betNumber').value);

            // Validações
            if (isNaN(betAmount) || betAmount <= 0) {
                alert("Insira um valor de aposta válido.");
                return;
            }
            if (betAmount > balance) {
                alert("Saldo insuficiente!");
                return;
            }
            if (betType === 'number' && (betNumber < 0 || betNumber > 36 || isNaN(betNumber))) {
                alert("Escolha um número entre 0 e 36.");
                return;
            }

            // Deduzir aposta
            balance -= betAmount;
            updateUI();
            isSpinning = true;
            document.getElementById('spinBtn').disabled = true;
            document.getElementById('message').innerText = "Girando...";
            document.getElementById('message').style.color = "#d4af37";

            // Lógica do Sorteio
            const winningIndex = Math.floor(Math.random() * wheelNumbers.length);
            const winningNumber = wheelNumbers[winningIndex];

            // Calcular Rotação
            // Queremos que o winningNumber pare no topo (0 graus).
            // A roda gira no sentido horário, então os números passam em ordem anti-horária sob o marcador.
            // Para alinhar o índice X no topo: Rotação = - (Index * Angulo)
            // Adicionamos voltas extras (ex: 5 voltas = 1800 graus) para dar efeito.
            
            const extraSpins = 360 * 5; // 5 voltas completas
            const targetRotation = -(winningIndex * sliceAngle); 
            
            // Ajuste fino para randomizar onde cai dentro da fatia (opcional, aqui centralizado)
            // O valor final deve acumular com a rotação anterior para não "resetar" visualmente
            
            // Precisamos calcular a posição relativa à rotação atual para que a animação seja suave
            // Arredondamos a rotação atual para o múltiplo de 360 mais próximo e somamos o novo alvo
            const currentMod = currentRotation % 360;
            const distToTarget = targetRotation - currentMod;
            const totalRotation = currentRotation + distToTarget + extraSpins;

            currentRotation = totalRotation; // Salva para a próxima
            
            wheelElement.style.transform = `rotate(${currentRotation}deg)`;

            // Esperar animação terminar (5 segundos definido no CSS)
            setTimeout(() => {
                checkWin(winningNumber, betType, betAmount, betNumber);
                addToHistory(winningNumber);
                isSpinning = false;
                document.getElementById('spinBtn').disabled = false;
            }, 5000);
        }

        function checkWin(result, type, amount, pickedNumber) {
            let won = false;
            let multiplier = 0;
            const isRed = redNumbers.includes(result);
            const isBlack = result !== 0 && !isRed;
            const isZero = result === 0;

            if (type === 'color_red' && isRed) {
                won = true; multiplier = 2;
            } else if (type === 'color_black' && isBlack) {
                won = true; multiplier = 2;
            } else if (type === 'number' && result === pickedNumber) {
                won = true; multiplier = 35; // Pagamento clássico
            } else if (type === 'even' && result !== 0 && result % 2 === 0) {
                won = true; multiplier = 2;
            } else if (type === 'odd' && result !== 0 && result % 2 !== 0) {
                won = true; multiplier = 2;
            }

            const msgEl = document.getElementById('message');

            if (won) {
                const winnings = amount * multiplier;
                balance += winnings;
                msgEl.innerText = `DEU ${result}! Você ganhou R$ ${winnings.toFixed(2)}!`;
                msgEl.style.color = "#00ff00";
            } else {
                msgEl.innerText = `DEU ${result}. Você perdeu. Tente novamente!`;
                msgEl.style.color = "#ff4444";
            }
            updateUI();
        }

        function addToHistory(num) {
            const historyEl = document.getElementById('history');
            const badge = document.createElement('div');
            badge.className = 'result-badge';
            badge.innerText = num;

            if (num === 0) badge.classList.add('green');
            else if (redNumbers.includes(num)) badge.classList.add('red');
            else badge.classList.add('black');

            // Manter apenas os últimos 10
            if (historyEl.children.length >= 10) {
                historyEl.removeChild(historyEl.lastChild);
            }
            historyEl.prepend(badge);
        }

        function updateUI() {
            document.getElementById('balanceDisplay').innerText = `R$ ${balance.toFixed(2)}`;
            const betVal = document.getElementById('betAmount').value;
            document.getElementById('currentBetDisplay').innerText = `R$ ${parseFloat(betVal || 0).toFixed(2)}`;
        }

        // Event Listeners
        document.getElementById('betAmount').addEventListener('input', updateUI);

        // Iniciar
        drawWheel();
    </script>
</body>
</html>
