<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Online com Fundo Canvas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module" src="https://cdn.jsdelivr.net/npm/emoji-picker-element@^1/index.js"></script>
    <style>
        /* Estilos para um visual mais limpo e responsivo */
        body {
            font-family: 'Inter', sans-serif;
            overflow: hidden; /* Evita barras de rolagem causadas pelo canvas */
        }
        #chat-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1; /* Coloca o canvas atrás de todo o conteúdo */
        }
        /* Efeito de fade-in para as mensagens */
        .chat-message {
            animation: fadeIn 0.5s ease-in-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        /* Custom scrollbar */
        #messages-container::-webkit-scrollbar, #gif-results::-webkit-scrollbar {
            width: 8px;
        }
        #messages-container::-webkit-scrollbar-track, #gif-results::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }
        #messages-container::-webkit-scrollbar-thumb, #gif-results::-webkit-scrollbar-thumb {
            background: rgba(192, 132, 252, 0.5); /* Cor roxa suave */
            border-radius: 10px;
        }
        #messages-container::-webkit-scrollbar-thumb:hover, #gif-results::-webkit-scrollbar-thumb:hover {
            background: rgba(192, 132, 252, 0.8);
        }
        .gif-item {
            cursor: pointer;
            transition: transform 0.2s;
        }
        .gif-item:hover {
            transform: scale(1.05);
        }
    </style>
     <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body class="bg-gray-900 text-white">

    <canvas id="chat-canvas"></canvas>

    <div id="room-selection" class="flex items-center justify-center h-screen bg-gray-900 bg-opacity-70">
        <div class="w-full max-w-md p-8 space-y-6 bg-gray-800 rounded-2xl shadow-lg border border-gray-700">
            <div class="text-center">
                <h1 class="text-3xl font-bold text-purple-400">Chat Visual</h1>
                <p class="text-gray-400 mt-2">Crie ou entre em uma sala para começar a conversar.</p>
            </div>
            <form id="room-form" class="space-y-6">
                 <div>
                    <label for="user-name" class="text-sm font-medium text-gray-300">Seu Nome</label>
                    <input id="user-name" name="user-name" type="text" required class="mt-1 block w-full px-4 py-3 bg-gray-700 border border-gray-600 rounded-lg text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-purple-500 focus:border-purple-500 transition" placeholder="ex: João">
                </div>
                <div>
                    <label for="room-name" class="text-sm font-medium text-gray-300">Nome da Sala</label>
                    <input id="room-name" name="room-name" type="text" required class="mt-1 block w-full px-4 py-3 bg-gray-700 border border-gray-600 rounded-lg text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-purple-500 focus:border-purple-500 transition" placeholder="ex: amigos-da-escola">
                </div>
                <button type="submit" class="w-full flex justify-center py-3 px-4 border border-transparent rounded-lg shadow-sm text-sm font-medium text-white bg-purple-600 hover:bg-purple-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-purple-500 focus:ring-offset-gray-800 transition transform hover:scale-105">
                    Entrar na Sala
                </button>
            </form>
        </div>
    </div>

    <div id="chat-container" class="hidden h-screen flex flex-col p-4 md:p-6 lg:p-8 relative">
        <div class="flex-grow flex flex-col bg-gray-800 bg-opacity-80 backdrop-blur-sm rounded-2xl shadow-2xl border border-gray-700 overflow-hidden">
            <header class="p-4 border-b border-gray-700 flex justify-between items-center">
                <h1 id="chat-room-title" class="text-xl font-bold text-purple-400"></h1>
                <button id="leave-room-btn" class="px-3 py-1 text-sm bg-red-600 hover:bg-red-700 rounded-lg transition">Sair</button>
            </header>
            <div id="messages-container" class="flex-1 p-4 space-y-4 overflow-y-auto">
                <!-- As mensagens do chat aparecerão aqui -->
            </div>
            <footer class="p-4 border-t border-gray-700">
                <form id="message-form" class="flex items-center space-x-3">
                    <button id="gif-btn" type="button" class="p-3 bg-gray-700 rounded-lg text-white hover:bg-gray-600 transition">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                    </button>
                     <button id="emoji-btn" type="button" class="p-3 bg-gray-700 rounded-lg text-white hover:bg-gray-600 transition">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.828 14.828a4 4 0 01-5.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    </button>
                    <input id="message-input" type="text" placeholder="Digite sua mensagem..." autocomplete="off" class="flex-1 block w-full px-4 py-3 bg-gray-700 border border-gray-600 rounded-lg text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-purple-500 focus:border-transparent transition">
                    <button type="submit" class="p-3 bg-purple-600 rounded-lg text-white hover:bg-purple-700 transition transform hover:scale-110">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                    </button>
                </form>
            </footer>
        </div>
        <div id="emoji-picker-container" class="absolute bottom-20 right-5 z-10 hidden">
            <emoji-picker class="light"></emoji-picker>
        </div>
    </div>
    
    <div id="gif-modal" class="hidden fixed inset-0 bg-black bg-opacity-80 flex items-center justify-center z-20 p-4">
        <div class="bg-gray-800 rounded-2xl shadow-lg p-6 w-full max-w-3xl flex flex-col border border-gray-700">
            <h3 class="text-xl font-bold text-purple-400 mb-4">Procurar GIFs</h3>
            <input id="gif-search-input" type="text" placeholder="Digite para procurar..." class="w-full px-4 py-2 bg-gray-700 border border-gray-600 rounded-lg text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-purple-500">
            <div id="gif-results" class="grid grid-cols-2 md:grid-cols-4 gap-4 mt-4 h-80 overflow-y-auto pr-2"></div>
            <button id="close-gif-modal" class="mt-6 w-full md:w-auto self-center px-6 py-2 bg-red-600 hover:bg-red-700 rounded-lg transition">Fechar</button>
        </div>
    </div>


    <script type="module">
        // Importações do Firebase - Corrigido e centralizado
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, query, onSnapshot, serverTimestamp, orderBy } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Sua configuração do Firebase que você pegou do seu projeto
        const firebaseConfig = {
            apiKey: "AIzaSyCUQi9SJeQRS83ph_CGckM245TUPXkC6BI",
            authDomain: "chat-73600.firebaseapp.com",
            projectId: "chat-73600",
            storageBucket: "chat-73600.appspot.com",
            messagingSenderId: "290594213111",
            appId: "1:290594213111:web:eaa9858a98b55d304317f2",
            measurementId: "G-CNVS2T6LE3"
        };

        // Variáveis globais do chat
        let db, auth, userId = null, currentRoom = null, currentUsername = null, unsubscribe = null, searchTimeout = null;

        // Inicializa o Firebase APENAS UMA VEZ
        try {
            const app = initializeApp(firebaseConfig);
            db = getFirestore(app);
            auth = getAuth(app);
        } catch (error) {
            console.error("Erro grave ao inicializar Firebase:", error);
            alert("Não foi possível conectar ao Firebase. Verifique a configuração no console.");
        }

        // --- LÓGICA DO CANVAS ANIMADO ---
        const canvas = document.getElementById('chat-canvas');
        const ctx = canvas.getContext('2d');
        let particlesArray;

        function setupCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        class Particle {
            constructor(x, y, directionX, directionY, size, color) {
                this.x = x; this.y = y; this.directionX = directionX; this.directionY = directionY; this.size = size; this.color = color;
            }
            draw() {
                ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2, false); ctx.fillStyle = this.color; ctx.fill();
            }
            update() {
                if (this.x > canvas.width || this.x < 0) { this.directionX = -this.directionX; }
                if (this.y > canvas.height || this.y < 0) { this.directionY = -this.directionY; }
                this.x += this.directionX; this.y += this.directionY; this.draw();
            }
        }

        function initCanvas() {
            particlesArray = [];
            let numberOfParticles = (canvas.height * canvas.width) / 9000;
            for (let i = 0; i < numberOfParticles; i++) {
                let size = (Math.random() * 2) + 1;
                let x = (Math.random() * ((innerWidth - size * 2) - (size * 2)) + size * 2);
                let y = (Math.random() * ((innerHeight - size * 2) - (size * 2)) + size * 2);
                let directionX = (Math.random() * .4) - .2; let directionY = (Math.random() * .4) - .2;
                let color = 'rgba(192, 132, 252, 0.5)';
                particlesArray.push(new Particle(x, y, directionX, directionY, size, color));
            }
        }

        function connectParticles() {
            let opacityValue = 1;
            for (let a = 0; a < particlesArray.length; a++) {
                for (let b = a; b < particlesArray.length; b++) {
                    let distance = ((particlesArray[a].x - particlesArray[b].x) * (particlesArray[a].x - particlesArray[b].x)) + ((particlesArray[a].y - particlesArray[b].y) * (particlesArray[a].y - particlesArray[b].y));
                    if (distance < (canvas.width / 7) * (canvas.height / 7)) {
                        opacityValue = 1 - (distance / 20000);
                        ctx.strokeStyle = `rgba(192, 132, 252, ${opacityValue})`;
                        ctx.lineWidth = 1;
                        ctx.beginPath(); ctx.moveTo(particlesArray[a].x, particlesArray[a].y); ctx.lineTo(particlesArray[b].x, particlesArray[b].y); ctx.stroke();
                    }
                }
            }
        }
        
        function animateCanvas() {
            requestAnimationFrame(animateCanvas);
            ctx.clearRect(0, 0, innerWidth, innerHeight);
            particlesArray.forEach(p => p.update());
            connectParticles();
        }
        
        window.addEventListener('resize', () => { setupCanvas(); initCanvas(); });
        setupCanvas(); initCanvas(); animateCanvas();

        // --- LÓGICA DO CHAT COM FIREBASE ---
        const roomSelection = document.getElementById('room-selection');
        const chatContainer = document.getElementById('chat-container');
        const roomForm = document.getElementById('room-form');
        const roomNameInput = document.getElementById('room-name');
        const userNameInput = document.getElementById('user-name');
        const chatRoomTitle = document.getElementById('chat-room-title');
        const messageForm = document.getElementById('message-form');
        const messageInput = document.getElementById('message-input');
        const messagesContainer = document.getElementById('messages-container');
        const leaveRoomBtn = document.getElementById('leave-room-btn');
        const emojiBtn = document.getElementById('emoji-btn');
        const emojiPickerContainer = document.getElementById('emoji-picker-container');
        const emojiPicker = document.querySelector('emoji-picker');
        const gifBtn = document.getElementById('gif-btn');
        const gifModal = document.getElementById('gif-modal');
        const closeGifModal = document.getElementById('close-gif-modal');
        const gifSearchInput = document.getElementById('gif-search-input');
        const gifResults = document.getElementById('gif-results');

        // Lembre-se de colocar sua chave de API do Giphy aqui
        const GIPHY_API_KEY = 'YOUR_GIPHY_API_KEY'; 

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                userId = user.uid;
            } else {
                try {
                    await signInAnonymously(auth);
                } catch (error) {
                    console.error("Falha na autenticação anônima:", error);
                }
            }
        });
        
        // --- Lógica de UI (Emoji/GIF) ---
        emojiBtn.addEventListener('click', () => emojiPickerContainer.classList.toggle('hidden'));
        gifBtn.addEventListener('click', () => gifModal.classList.remove('hidden'));
        closeGifModal.addEventListener('click', () => gifModal.classList.add('hidden'));
        emojiPicker.addEventListener('emoji-click', event => {
            messageInput.value += event.detail.unicode;
        });
        document.addEventListener('click', (event) => {
            if (!emojiBtn.contains(event.target) && !emojiPickerContainer.contains(event.target)) {
                emojiPickerContainer.classList.add('hidden');
            }
        });
        
        // --- Lógica do Giphy ---
        gifSearchInput.addEventListener('keyup', () => {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => {
                const searchTerm = gifSearchInput.value.trim();
                if (searchTerm.length > 2) fetchGifs(searchTerm);
            }, 500);
        });
        
        async function fetchGifs(searchTerm) {
            if (GIPHY_API_KEY === 'YOUR_GIPHY_API_KEY') {
                gifResults.innerHTML = `<p class="col-span-full text-center text-yellow-400">Por favor, insira uma chave de API do Giphy no código para usar esta função.</p>`;
                return;
            }
            gifResults.innerHTML = `<p class="col-span-full text-center">Carregando...</p>`;
            try {
                const response = await fetch(`https://api.giphy.com/v1/gifs/search?api_key=${GIPHY_API_KEY}&q=${encodeURIComponent(searchTerm)}&limit=20&rating=g`);
                const data = await response.json();
                gifResults.innerHTML = '';
                data.data.forEach(gif => {
                    const img = document.createElement('img');
                    img.src = gif.images.fixed_height_small.url;
                    img.alt = gif.title;
                    img.classList.add('w-full', 'h-full', 'object-cover', 'rounded-lg', 'gif-item');
                    img.addEventListener('click', () => {
                        sendChatMessage(gif.images.original.url, 'gif');
                        gifModal.classList.add('hidden');
                        gifSearchInput.value = '';
                        gifResults.innerHTML = '';
                    });
                    gifResults.appendChild(img);
                });
            } catch (error) {
                console.error("Erro ao buscar GIFs:", error);
                gifResults.innerHTML = `<p class="col-span-full text-center text-red-400">Não foi possível carregar os GIFs.</p>`;
            }
        }

        // --- Lógica do Chat ---
        roomForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const roomName = roomNameInput.value.trim().toLowerCase().replace(/\s+/g, '-');
            const userName = userNameInput.value.trim();
            if (roomName && userName && userId) { 
                currentRoom = roomName;
                currentUsername = userName;
                enterChatRoom(currentRoom);
            } else if (!userId) {
                alert("Aguardando autenticação... Tente novamente em alguns segundos.");
            }
        });

        leaveRoomBtn.addEventListener('click', () => {
            if (unsubscribe) unsubscribe();
            currentRoom = null;
            currentUsername = null;
            chatContainer.classList.add('hidden');
            roomSelection.classList.remove('hidden');
            messagesContainer.innerHTML = '';
        });

        function enterChatRoom(roomName) {
            roomSelection.classList.add('hidden');
            chatContainer.classList.remove('hidden');
            chatRoomTitle.textContent = `Sala: ${roomName}`;
            
            const messagesCollection = collection(db, `chat_rooms/${roomName}/messages`);
            const q = query(messagesCollection, orderBy('timestamp'));
            
            unsubscribe = onSnapshot(q, (snapshot) => {
                messagesContainer.innerHTML = '';
                snapshot.forEach((doc) => renderMessage(doc.data()));
                messagesContainer.scrollTop = messagesContainer.scrollHeight;
            });
        }
        
        messageForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const messageText = messageInput.value.trim();
            if (messageText) sendChatMessage(messageText, 'text');
            messageInput.value = '';
            emojiPickerContainer.classList.add('hidden');
        });
        
        async function sendChatMessage(content, type) {
            if (!content || !currentRoom || !userId) return;
            try {
                const messagesCollection = collection(db, `chat_rooms/${currentRoom}/messages`);
                await addDoc(messagesCollection, {
                    content: content,
                    type: type,
                    senderId: userId,
                    username: currentUsername,
                    timestamp: serverTimestamp()
                });
            } catch (error) { console.error("Erro ao enviar mensagem:", error); }
        }

        function renderMessage(data) {
            const isSentByMe = data.senderId === userId;
            const messageWrapper = document.createElement('div');
            messageWrapper.classList.add('chat-message', 'flex', isSentByMe ? 'justify-end' : 'justify-start');

            const messageBubble = document.createElement('div');
            messageBubble.classList.add('max-w-xs', 'md:max-w-md', 'px-3', 'py-2', 'rounded-2xl');
            
            const senderIdDisplay = document.createElement('div');
            senderIdDisplay.classList.add('text-xs', 'font-bold', 'opacity-70', 'mb-1');

            let timeString = '';
            if (data.timestamp && data.timestamp.toDate) {
                const date = data.timestamp.toDate();
                const hours = date.getHours().toString().padStart(2, '0');
                const minutes = date.getMinutes().toString().padStart(2, '0');
                timeString = ` às ${hours}:${minutes}`;
            }

            const username = data.username || `User-${data.senderId.substring(0, 6)}`;
            senderIdDisplay.textContent = `${username}${timeString}`;

            if (isSentByMe) {
                messageBubble.classList.add('bg-purple-600', 'text-white');
                senderIdDisplay.classList.add('text-purple-200', 'text-right');
            } else {
                messageBubble.classList.add('bg-gray-700', 'text-white');
                senderIdDisplay.classList.add('text-gray-400');
            }
            
            messageBubble.appendChild(senderIdDisplay);

            if (data.type === 'gif') {
                const gifImg = document.createElement('img');
                gifImg.src = data.content;
                gifImg.alt = 'GIF animado';
                gifImg.classList.add('rounded-lg', 'mt-1', 'max-w-full', 'h-auto');
                messageBubble.appendChild(gifImg);
            } else {
                const messageText = document.createElement('p');
                messageText.style.wordBreak = 'break-word';
                messageText.textContent = data.content || data.text;
                messageBubble.appendChild(messageText);
            }

            messageWrapper.appendChild(messageBubble);
            messagesContainer.appendChild(messageWrapper);
        }

    </script>
</body>
</html>
