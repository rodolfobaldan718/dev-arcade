<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo de Quiz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #1a202c;
            color: #e2e8f0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }
 
        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        .container {
            max-width: 600px;
            width: 90%;
            background-color: rgba(45, 55, 72, 0.7); /* Fundo semi-transparente */
            backdrop-filter: blur(10px); /* Efeito de vidro fosco */
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(74, 85, 104, 0.5);
            border-radius: 16px;
            padding: 2.5rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3), 0 4px 6px -2px rgba(0, 0, 0, 0.1);
        }

        .btn {
            background-color: #4a5568;
            color: #e2e8f0;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease-in-out;
            border: none;
            text-align: center;
        }
        .btn:hover {
            background-color: #616e81;
            transform: translateY(-2px);
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.2);
        }
        .btn:active {
            transform: translateY(0);
        }
        .btn.correct {
            background-color: #48bb78;
        }
        .btn.wrong {
            background-color: #f56565;
        }
        .result-container {
            text-align: center;
        }
        .editor-input {
            width: 100%;
            padding: 0.5rem;
            border-radius: 6px;
            background-color: #4a5568;
            border: 1px solid #718096;
            color: #e2e8f0;
        }

        /* Estilo para o modal de confirmação */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background-color: #2d3748;
            padding: 2rem;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
        }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 flex items-center justify-center min-h-screen">

    <!-- Canvas para o fundo animado -->
    <canvas id="bg-canvas"></canvas>

    <!-- Interface do Jogo -->
    <div id="quiz-container" class="container">
        <h1 id="question-text" class="text-2xl font-bold mb-6 text-center"></h1>
        <div id="options-container" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
        <div id="message" class="mt-4 text-center font-bold"></div>
        <div class="mt-8 flex justify-between items-center">
            <p id="question-count" class="text-sm text-gray-400"></p>
            <button id="next-button" class="btn hidden">Próxima Pergunta</button>
            <button id="restart-button" class="btn hidden">Reiniciar</button>
        </div>
    </div>

    <!-- Interface de Resultados -->
    <div id="result-container" class="container hidden result-container">
        <h2 class="text-3xl font-bold mb-4">Quiz Concluído!</h2>
        <p id="score-text" class="text-xl mb-6"></p>
        <button id="play-again-button" class="btn">Jogar Novamente</button>
    </div>

    <!-- Interface de Edição -->
    <div id="editor-container" class="container hidden">
        <h2 class="text-2xl font-bold mb-4 text-center">Editor de Perguntas</h2>
        <form id="question-form" class="space-y-4">
            <div>
                <label for="question-input" class="block mb-2 font-bold">Pergunta:</label>
                <input type="text" id="question-input" placeholder="Digite a pergunta aqui..." class="editor-input">
            </div>
            <div id="options-form-container" class="space-y-2">
                <p class="font-bold">Opções de Resposta:</p>
                <!-- Opções serão adicionadas via JavaScript -->
            </div>
            <button type="button" id="add-option-btn" class="btn text-sm">+ Adicionar Opção</button>
            <input type="hidden" id="editing-index">
            <div class="flex justify-between mt-6">
                <button type="submit" id="save-question-btn" class="btn bg-green-600 hover:bg-green-700">Salvar Pergunta</button>
                <button type="button" id="cancel-edit-btn" class="btn bg-red-600 hover:bg-red-700">Cancelar</button>
            </div>
        </form>

        <div class="mt-8">
            <h3 class="text-xl font-bold mb-2">Perguntas Existentes</h3>
            <div id="questions-list" class="space-y-4">
                <!-- Lista de perguntas será renderizada aqui -->
                <p id="no-questions-message" class="text-gray-400 text-center">Nenhuma pergunta ainda. Adicione uma para começar!</p>
            </div>
        </div>

        <div class="mt-8 text-center">
            <button id="start-quiz-btn" class="btn text-lg w-full">Iniciar Quiz</button>
        </div>
    </div>

    <!-- Modal de Confirmação -->
    <div id="confirm-modal" class="modal-overlay hidden">
        <div class="modal-content">
            <p class="mb-6 text-lg">Tem certeza que deseja excluir esta pergunta?</p>
            <div class="flex justify-center space-x-4">
                <button id="confirm-yes" class="btn bg-red-600 hover:bg-red-700">Sim</button>
                <button id="confirm-no" class="btn">Não</button>
            </div>
        </div>
    </div>

    <!-- Botão para alternar entre Editor e Jogo -->
    <button id="toggle-view-btn" class="fixed bottom-4 right-4 p-4 rounded-full bg-blue-600 hover:bg-blue-700 text-white shadow-lg transition-transform duration-200 ease-in-out">
        Alternar
    </button>

<script>
    // Referências aos elementos do DOM
    const quizContainer = document.getElementById('quiz-container');
    const resultContainer = document.getElementById('result-container');
    const editorContainer = document.getElementById('editor-container');
    const toggleViewBtn = document.getElementById('toggle-view-btn');
    const questionTextElement = document.getElementById('question-text');
    const optionsContainerElement = document.getElementById('options-container');
    const nextButton = document.getElementById('next-button');
    const restartButton = document.getElementById('restart-button');
    const messageElement = document.getElementById('message');
    const scoreTextElement = document.getElementById('score-text');
    const playAgainButton = document.getElementById('play-again-button');
    const questionForm = document.getElementById('question-form');
    const questionInput = document.getElementById('question-input');
    const optionsFormContainer = document.getElementById('options-form-container');
    const addOptionBtn = document.getElementById('add-option-btn');
    const questionsList = document.getElementById('questions-list');
    const noQuestionsMessage = document.getElementById('no-questions-message');
    const startQuizBtn = document.getElementById('start-quiz-btn');
    const editingIndexInput = document.getElementById('editing-index');
    const questionCountElement = document.getElementById('question-count');

    // Modal de confirmação
    const confirmModal = document.getElementById('confirm-modal');
    const confirmYesBtn = document.getElementById('confirm-yes');
    const confirmNoBtn = document.getElementById('confirm-no');
    let confirmCallback = null;

    // Estado do Quiz
    let quizQuestions = [];
    let currentQuestionIndex = 0;
    let score = 0;
    let answered = false;
    let currentView = 'editor'; // 'quiz' ou 'editor'

    // Funções do Canvas de Fundo Animado
    const canvas = document.getElementById('bg-canvas');
    const ctx = canvas.getContext('2d');
    let particles = [];
    const particleCount = 100;

    function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }

    class Particle {
        constructor() {
            this.x = Math.random() * canvas.width;
            this.y = Math.random() * canvas.height;
            this.size = Math.random() * 2 + 0.5;
            this.speedX = Math.random() * 1 - 0.5;
            this.speedY = Math.random() * 1 - 0.5;
            this.color = `rgba(255, 255, 255, ${Math.random() * 0.5 + 0.1})`;
        }
        update() {
            this.x += this.speedX;
            this.y += this.speedY;

            if (this.size > 0.1) {
                this.size -= 0.01;
            }

            if (this.x > canvas.width || this.x < 0) this.speedX *= -1;
            if (this.y > canvas.height || this.y < 0) this.speedY *= -1;
        }
        draw() {
            ctx.fillStyle = this.color;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fill();
        }
    }

    function createParticles() {
        particles = [];
        for (let i = 0; i < particleCount; i++) {
            particles.push(new Particle());
        }
    }

    function animateCanvas() {
        ctx.fillStyle = 'rgba(26, 32, 44, 0.1)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        for (let i = 0; i < particles.length; i++) {
            particles[i].update();
            particles[i].draw();
        }
        requestAnimationFrame(animateCanvas);
    }
    
    // Funções de Gerenciamento de Dados
    function loadQuestions() {
        const savedQuestions = localStorage.getItem('quizQuestions');
        if (savedQuestions) {
            try {
                quizQuestions = JSON.parse(savedQuestions);
            } catch (e) {
                console.error("Erro ao carregar perguntas do localStorage:", e);
                quizQuestions = [];
            }
        }
        if (quizQuestions.length === 0) {
            quizQuestions = [
                { question: "Qual é o maior planeta do nosso sistema solar?", options: ["Vênus", "Júpiter", "Marte", "Saturno"], correctAnswer: "Júpiter" },
                { question: "Qual é a capital do Japão?", options: ["Seul", "Pequim", "Bangkok", "Tóquio"], correctAnswer: "Tóquio" },
                { question: "Quem pintou a Mona Lisa?", options: ["Vincent van Gogh", "Pablo Picasso", "Leonardo da Vinci", "Claude Monet"], correctAnswer: "Leonardo da Vinci" },
            ];
        }
        saveQuestions();
    }

    function saveQuestions() {
        localStorage.setItem('quizQuestions', JSON.stringify(quizQuestions));
        renderQuestionList();
    }

    // Funções de Gerenciamento da Interface
    function showView(view) {
        currentView = view;
        quizContainer.classList.add('hidden');
        resultContainer.classList.add('hidden');
        editorContainer.classList.add('hidden');
        if (view === 'quiz') {
            quizContainer.classList.remove('hidden');
            if (quizQuestions.length > 0) {
                showQuestion();
            } else {
                questionTextElement.innerText = "Nenhuma pergunta disponível. Adicione perguntas no editor para começar.";
                optionsContainerElement.innerHTML = '';
            }
        } else if (view === 'editor') {
            editorContainer.classList.remove('hidden');
            renderQuestionList();
        }
    }
    
    // Funções do Quiz
    function showQuestion() {
        answered = false;
        if (quizQuestions.length === 0) {
            showResults();
            return;
        }
        
        const currentQuestion = quizQuestions[currentQuestionIndex];
        questionTextElement.innerText = currentQuestion.question;
        questionCountElement.innerText = `Pergunta ${currentQuestionIndex + 1} de ${quizQuestions.length}`;
        optionsContainerElement.innerHTML = '';
        messageElement.innerText = '';
        nextButton.classList.add('hidden');
        restartButton.classList.add('hidden');

        currentQuestion.options.forEach(option => {
            const button = document.createElement('button');
            button.innerText = option;
            button.classList.add('btn', 'w-full');
            button.addEventListener('click', () => selectAnswer(option, currentQuestion.correctAnswer));
            optionsContainerElement.appendChild(button);
        });
    }

    function selectAnswer(selectedOption, correctAnswer) {
        if (answered) return;
        answered = true;
        
        const options = optionsContainerElement.querySelectorAll('.btn');
        options.forEach(option => {
            if (option.innerText === correctAnswer) {
                option.classList.add('correct');
            } else if (option.innerText === selectedOption) {
                option.classList.add('wrong');
            }
        });

        if (selectedOption === correctAnswer) {
            score++;
            messageElement.innerText = 'Correto!';
            messageElement.classList.remove('text-red-500');
            messageElement.classList.add('text-green-500');
        } else {
            messageElement.innerText = `Incorreto. A resposta certa era: ${correctAnswer}.`;
            messageElement.classList.remove('text-green-500');
            messageElement.classList.add('text-red-500');
        }

        if (currentQuestionIndex < quizQuestions.length - 1) {
            nextButton.classList.remove('hidden');
        } else {
            restartButton.classList.remove('hidden');
        }
    }

    function nextQuestion() {
        currentQuestionIndex++;
        if (currentQuestionIndex < quizQuestions.length) {
            showQuestion();
        } else {
            showResults();
        }
    }

    function showResults() {
        quizContainer.classList.add('hidden');
        resultContainer.classList.remove('hidden');
        scoreTextElement.innerText = `Você acertou ${score} de ${quizQuestions.length} perguntas.`;
    }

    function restartQuiz() {
        currentQuestionIndex = 0;
        score = 0;
        showView('quiz');
    }

    // Funções do Editor
    function renderQuestionList() {
        questionsList.innerHTML = '';
        if (quizQuestions.length === 0) {
            noQuestionsMessage.classList.remove('hidden');
            startQuizBtn.classList.add('hidden');
        } else {
            noQuestionsMessage.classList.add('hidden');
            startQuizBtn.classList.remove('hidden');
            quizQuestions.forEach((q, index) => {
                const item = document.createElement('div');
                item.classList.add('bg-gray-700', 'p-4', 'rounded-lg', 'flex', 'justify-between', 'items-center', 'shadow-md');
                item.innerHTML = `
                    <span>${q.question}</span>
                    <div class="flex space-x-2">
                        <button type="button" class="btn text-xs px-2 py-1 bg-blue-500 hover:bg-blue-600" data-action="edit" data-index="${index}">Editar</button>
                        <button type="button" class="btn text-xs px-2 py-1 bg-red-500 hover:bg-red-600" data-action="delete" data-index="${index}">Excluir</button>
                    </div>
                `;
                questionsList.appendChild(item);
            });
        }
    }

    function renderOptionInputs(options = [''], correctAnswer = '') {
        optionsFormContainer.innerHTML = '<p class="font-bold">Opções de Resposta:</p>';
        options.forEach((optionText, index) => {
            const div = document.createElement('div');
            div.classList.add('flex', 'items-center', 'space-x-2');
            div.innerHTML = `
                <input type="radio" name="correct-option" value="${index}" ${optionText === correctAnswer ? 'checked' : ''} class="form-radio text-blue-600">
                <input type="text" placeholder="Opção ${index + 1}" value="${optionText}" class="editor-input option-input" required>
                <button type="button" class="text-red-500 hover:text-red-700 font-bold text-lg leading-none" onclick="this.parentNode.remove();">
                    &times;
                </button>
            `;
            optionsFormContainer.appendChild(div);
        });
    }

    function getFormValues() {
        const question = questionInput.value.trim();
        const optionInputs = optionsFormContainer.querySelectorAll('.option-input');
        const options = Array.from(optionInputs).map(input => input.value.trim()).filter(val => val !== '');
        
        const correctRadio = optionsFormContainer.querySelector('input[name="correct-option"]:checked');
        const correctIndex = correctRadio ? parseInt(correctRadio.value) : -1;
        const correctAnswer = options[correctIndex] || '';

        return { question, options, correctAnswer };
    }

    function clearForm() {
        questionForm.reset();
        editingIndexInput.value = '';
        renderOptionInputs(['', '']);
    }

    // Modal de Confirmação
    function showConfirmModal(callback) {
        confirmCallback = callback;
        confirmModal.classList.remove('hidden');
    }

    function hideConfirmModal() {
        confirmModal.classList.add('hidden');
        confirmCallback = null;
    }

    confirmYesBtn.addEventListener('click', () => {
        if (confirmCallback) {
            confirmCallback();
        }
        hideConfirmModal();
    });

    confirmNoBtn.addEventListener('click', hideConfirmModal);

    // Event Listeners
    toggleViewBtn.addEventListener('click', () => {
        if (currentView === 'quiz') {
            showView('editor');
            toggleViewBtn.innerText = "Voltar ao Jogo";
        } else {
            showView('quiz');
            toggleViewBtn.innerText = "Ir para o Editor";
        }
    });
    
    startQuizBtn.addEventListener('click', () => {
        currentQuestionIndex = 0;
        score = 0;
        showView('quiz');
        toggleViewBtn.innerText = "Ir para o Editor";
    });

    nextButton.addEventListener('click', nextQuestion);
    restartButton.addEventListener('click', showResults);
    playAgainButton.addEventListener('click', restartQuiz);

    questionForm.addEventListener('submit', (event) => {
        event.preventDefault();
        const { question, options, correctAnswer } = getFormValues();

        if (question === '' || options.length < 2 || correctAnswer === '') {
            return;
        }

        const newQuestion = { question, options, correctAnswer };
        const editingIndex = editingIndexInput.value;
        if (editingIndex !== '') {
            quizQuestions[editingIndex] = newQuestion;
        } else {
            quizQuestions.push(newQuestion);
        }
        
        saveQuestions();
        clearForm();
    });

    addOptionBtn.addEventListener('click', () => renderOptionInputs([...getFormValues().options, '']));

    questionsList.addEventListener('click', (event) => {
        const target = event.target;
        const action = target.getAttribute('data-action');
        const index = parseInt(target.getAttribute('data-index'));

        if (action === 'edit') {
            const questionToEdit = quizQuestions[index];
            questionInput.value = questionToEdit.question;
            renderOptionInputs(questionToEdit.options, questionToEdit.correctAnswer);
            editingIndexInput.value = index;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        } else if (action === 'delete') {
            showConfirmModal(() => {
                quizQuestions.splice(index, 1);
                saveQuestions();
            });
        }
    });
    
    // Iniciar
    document.addEventListener('DOMContentLoaded', () => {
        // Inicializa o canvas e as perguntas
        resizeCanvas();
        createParticles();
        animateCanvas();
        window.addEventListener('resize', resizeCanvas);

        loadQuestions();
        showView('editor');
        toggleViewBtn.innerText = "Ir para o Jogo";
    });
</script>

</body>
</html>
