<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caça-Palavras Profissional</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f0f4f8;
            height: 100vh;
            overflow: hidden; /* Evita a rolagem */
        }
        .container {
            background: linear-gradient(135deg, #1f2937 0%, #111827 100%);
            border-radius: 1.5rem;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }
        #game-board {
            display: grid;
            border-radius: 0.75rem;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        .grid-cell {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.2rem;
            font-weight: bold;
            color: #d1d5db;
            background-color: #374151;
            border: 1px solid #4b5563;
            user-select: none;
            cursor: pointer;
            transition: all 0.2s ease-in-out;
        }
        .grid-cell:hover {
            background-color: #4b5563;
        }
        .grid-cell.selected {
            background-color: #6ee7b7;
            color: #111827;
        }
        .grid-cell.found {
            background-color: #10b981;
            color: #ffffff;
            animation: bounceIn 0.5s ease-in-out;
        }
        #word-list {
            background-color: #374151;
            border-radius: 0.75rem;
            padding: 1rem;
            color: #d1d5db;
        }
        #word-list h2 {
            color: #a1a1a1;
        }
        .word {
            text-decoration: none;
            transition: all 0.2s ease-in-out;
        }
        .word.found {
            text-decoration: line-through;
            color: #10b981;
            font-style: italic;
        }
        #message-box {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.8);
            background-color: rgba(17, 24, 39, 0.95);
            color: #fff;
            padding: 2rem;
            border-radius: 1rem;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.5);
            text-align: center;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease-in-out;
            z-index: 100;
        }
        #message-box.show {
            opacity: 1;
            visibility: visible;
            transform: translate(-50%, -50%) scale(1);
        }
        #message-box h3 {
            font-size: 2rem;
            font-weight: bold;
            margin-bottom: 1rem;
            color: #6ee7b7;
        }
        #message-box p {
            margin-bottom: 1.5rem;
        }
        #message-box button {
            background-color: #10b981;
            color: #fff;
            padding: 0.75rem 2rem;
            border-radius: 0.5rem;
            font-weight: bold;
            transition: background-color 0.2s;
        }
        #message-box button:hover {
            background-color: #059669;
        }
        @keyframes bounceIn {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.1);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border-left-color: #6ee7b7;
            animation: spin 1s ease infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        /* Mobile specific styles */
        @media (max-width: 768px) {
            .grid-cell {
                font-size: 0.8rem;
            }
            #word-list {
                margin-top: 1rem;
            }
        }
    </style>
</head>
<body class="bg-gray-200 flex items-center justify-center h-screen w-screen p-4">

    <div id="game-container" class="container h-full w-full max-w-7xl p-8 flex flex-col md:flex-row gap-8">
        <!-- Game Board Section -->
        <div class="flex-1 flex flex-col items-center justify-center">
            <h1 class="text-3xl md:text-4xl font-bold mb-4 text-white">Caça-Palavras</h1>
            <div id="game-board" class="w-full h-full aspect-square md:w-96 md:h-96 max-w-md max-h-md"></div>
        </div>

        <!-- Word List Section -->
        <div id="word-list" class="flex-none w-full md:w-64 flex flex-col items-center">
            <h2 class="text-xl font-bold mb-4 text-center md:text-left">Palavras para Encontrar:</h2>
            <ul id="word-list-items" class="list-none p-0 flex flex-wrap gap-2 justify-center md:flex-col md:justify-start md:gap-0"></ul>
            <div id="loading-spinner" class="mt-4 hidden">
                <div class="spinner"></div>
                <p class="text-white mt-2">Gerando palavras...</p>
            </div>
        </div>
    </div>

    <!-- Message Box -->
    <div id="message-box" class="hidden">
        <h3 id="message-title"></h3>
        <p id="message-text"></p>
        <button id="message-button">Jogar Novamente</button>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            let words = [];
            const boardSize = 12;
            const board = [];
            const foundWords = new Set();
            let selectedCells = [];
            let isDragging = false;
            let startCell = null;

            const boardElement = document.getElementById('game-board');
            const wordListElement = document.getElementById('word-list-items');
            const messageBox = document.getElementById('message-box');
            const messageTitle = document.getElementById('message-title');
            const messageText = document.getElementById('message-text');
            const messageButton = document.getElementById('message-button');
            const loadingSpinner = document.getElementById('loading-spinner');

            // Initialize the board with empty cells
            function initializeBoard() {
                boardElement.innerHTML = '';
                boardElement.style.gridTemplateColumns = `repeat(${boardSize}, 1fr)`;
                for (let i = 0; i < boardSize * boardSize; i++) {
                    board[i] = '';
                    const cell = document.createElement('div');
                    cell.className = 'grid-cell';
                    cell.dataset.index = i;
                    boardElement.appendChild(cell);
                }
            }

            // Shuffle an array
            function shuffle(array) {
                for (let i = array.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [array[i], array[j]] = [array[j], array[i]];
                }
            }

            // Get words from Gemini API
            async function getWordsFromAI() {
                const systemPrompt = "Gere uma lista de 10 palavras em português, de dificuldade média, para um jogo de caça-palavras. As palavras devem ser relacionadas ao tema \"tecnologia\". Responda apenas com a lista de palavras, separadas por vírgulas e em letras maiúsculas.";
                const userQuery = "Gere as palavras.";
                const apiKey = "";
                const apiUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-05-20:generateContent?key=${apiKey}`;

                const payload = {
                    contents: [{ parts: [{ text: userQuery }] }],
                    systemInstruction: {
                        parts: [{ text: systemPrompt }]
                    },
                };

                try {
                    const response = await fetch(apiUrl, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    if (!response.ok) {
                        throw new Error(`Erro na API: ${response.statusText}`);
                    }

                    const result = await response.json();
                    const text = result.candidates?.[0]?.content?.parts?.[0]?.text;
                    if (text) {
                        return text.split(',').map(word => word.trim().toUpperCase());
                    } else {
                        return ["API", "FALHOU", "TENTE", "NOVAMENTE"];
                    }
                } catch (error) {
                    console.error('Erro ao gerar palavras:', error);
                    return ["API", "FALHOU", "TENTE", "NOVAMENTE"];
                }
            }

            // Try to place a word on the board
            function placeWord(word) {
                const directions = [
                    [1, 0],   // Horizontal
                    [0, 1],   // Vertical
                    [1, 1],   // Diagonal down-right
                    [1, -1]   // Diagonal down-left
                ];
                shuffle(directions);

                for (const [dx, dy] of directions) {
                    const positions = [];
                    for (let y = 0; y < boardSize; y++) {
                        for (let x = 0; x < boardSize; x++) {
                            positions.push({ x, y });
                        }
                    }
                    shuffle(positions);

                    for (const { x, y } of positions) {
                        let canPlace = true;
                        const wordLength = word.length;
                        const cellsToPlace = [];

                        for (let i = 0; i < wordLength; i++) {
                            const newX = x + i * dx;
                            const newY = y + i * dy;
                            const newIndex = newY * boardSize + newX;

                            if (newX >= boardSize || newY >= boardSize || newX < 0 || newY < 0 || (board[newIndex] !== '' && board[newIndex] !== word[i])) {
                                canPlace = false;
                                break;
                            }
                            cellsToPlace.push({ index: newIndex, letter: word[i] });
                        }

                        if (canPlace) {
                            for (const { index, letter } of cellsToPlace) {
                                board[index] = letter;
                            }
                            return true;
                        }
                    }
                }
                return false;
            }

            // Fill empty cells with random letters
            function fillEmptyCells() {
                const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
                for (let i = 0; i < board.length; i++) {
                    if (board[i] === '') {
                        board[i] = alphabet.charAt(Math.floor(Math.random() * alphabet.length));
                    }
                }
            }

            // Render the board
            function renderBoard() {
                const cells = boardElement.children;
                for (let i = 0; i < board.length; i++) {
                    cells[i].textContent = board[i];
                }
            }

            // Render the word list
            function renderWordList() {
                wordListElement.innerHTML = '';
                words.forEach(word => {
                    const li = document.createElement('li');
                    li.textContent = word;
                    li.className = 'word text-sm md:text-base font-medium transition-all duration-200';
                    li.dataset.word = word;
                    wordListElement.appendChild(li);
                });
            }

            // Handle start of selection
            function handleMouseDown(e) {
                e.preventDefault();
                const cell = e.target.closest('.grid-cell');
                if (!cell) return;
                isDragging = true;
                startCell = cell;
                selectedCells = [cell];
                cell.classList.add('selected');
            }

            // Handle movement during selection
            function handleMouseMove(e) {
                if (!isDragging) return;
                const cell = e.target.closest('.grid-cell');
                if (!cell || selectedCells.includes(cell)) return;

                const newCellIndex = parseInt(cell.dataset.index);
                const lastCellIndex = parseInt(selectedCells[selectedCells.length - 1].dataset.index);

                // Check for valid continuous movement
                const rowStart = Math.floor(parseInt(startCell.dataset.index) / boardSize);
                const colStart = parseInt(startCell.dataset.index) % boardSize;
                const rowNew = Math.floor(newCellIndex / boardSize);
                const colNew = newCellIndex % boardSize;

                const dRow = Math.abs(rowNew - rowStart);
                const dCol = Math.abs(colNew - colStart);

                if (dRow === dCol || dRow === 0 || dCol === 0) {
                    // It's a straight line, add all cells in between
                    const cellsInBetween = getCellsInLine(startCell, cell);
                    if (cellsInBetween.length === selectedCells.length + 1) {
                        // Clear previous selection and add new line
                        selectedCells.forEach(c => c.classList.remove('selected'));
                        selectedCells = cellsInBetween;
                        selectedCells.forEach(c => c.classList.add('selected'));
                    }
                }
            }

            // Get all cells in a straight line between two points
            function getCellsInLine(startCell, endCell) {
                const startIndex = parseInt(startCell.dataset.index);
                const endIndex = parseInt(endCell.dataset.index);
                const startRow = Math.floor(startIndex / boardSize);
                const startCol = startIndex % boardSize;
                const endRow = Math.floor(endIndex / boardSize);
                const endCol = endIndex % boardSize;

                const cells = [];
                let dx = 0, dy = 0;
                if (startCol < endCol) dx = 1;
                else if (startCol > endCol) dx = -1;
                if (startRow < endRow) dy = 1;
                else if (startRow > endRow) dy = -1;

                let x = startCol;
                let y = startRow;
                while (true) {
                    const index = y * boardSize + x;
                    cells.push(boardElement.children[index]);
                    if (x === endCol && y === endRow) break;
                    x += dx;
                    y += dy;
                }
                return cells;
            }

            // Handle end of selection
            function handleMouseUp() {
                isDragging = false;
                if (selectedCells.length > 1) {
                    const word = selectedCells.map(cell => cell.textContent).join('');
                    const reversedWord = word.split('').reverse().join('');

                    let found = false;
                    const normalizedWord = word.toUpperCase();
                    const normalizedReversed = reversedWord.toUpperCase();

                    if (words.includes(normalizedWord) && !foundWords.has(normalizedWord)) {
                        found = true;
                        foundWords.add(normalizedWord);
                    } else if (words.includes(normalizedReversed) && !foundWords.has(normalizedReversed)) {
                        found = true;
                        foundWords.add(normalizedReversed);
                    }

                    if (found) {
                        selectedCells.forEach(cell => {
                            cell.classList.remove('selected');
                            cell.classList.add('found');
                        });
                        
                        const wordElement = document.querySelector(`[data-word="${normalizedWord}"]`) || document.querySelector(`[data-word="${normalizedReversed}"]`);
                        if (wordElement) {
                            wordElement.classList.add('found');
                        }

                        if (foundWords.size === words.length) {
                            showEndGameMessage(true);
                        }
                    } else {
                        selectedCells.forEach(cell => cell.classList.remove('selected'));
                    }
                } else {
                    selectedCells.forEach(cell => cell.classList.remove('selected'));
                }
                selectedCells = [];
            }

            // Show a message to the user
            function showEndGameMessage(win) {
                messageBox.classList.add('show');
                if (win) {
                    messageTitle.textContent = 'Parabéns!';
                    messageText.textContent = 'Você encontrou todas as palavras!';
                } else {
                    messageTitle.textContent = 'Fim de Jogo';
                    messageText.textContent = 'Tente novamente para encontrar todas as palavras.';
                }
                messageBox.classList.remove('hidden');
                messageBox.classList.add('flex');
            }

            // Start a new game
            async function newGame() {
                foundWords.clear();
                selectedCells = [];
                isDragging = false;
                startCell = null;
                messageBox.classList.remove('show', 'flex');
                messageBox.classList.add('hidden');
                wordListElement.innerHTML = '';
                loadingSpinner.classList.remove('hidden');

                // Generate words from AI
                words = await getWordsFromAI();
                
                loadingSpinner.classList.add('hidden');
                
                initializeBoard();
                
                // Shuffle words for random placement
                shuffle(words);

                // Place words on the board
                words.forEach(word => {
                    placeWord(word.toUpperCase());
                });

                fillEmptyCells();
                renderBoard();
                renderWordList();
            }

            // Event listeners
            boardElement.addEventListener('mousedown', handleMouseDown);
            boardElement.addEventListener('mousemove', handleMouseMove);
            boardElement.addEventListener('mouseup', handleMouseUp);
            boardElement.addEventListener('mouseleave', handleMouseUp); // End selection if mouse leaves the board

            // Touch events for mobile
            boardElement.addEventListener('touchstart', (e) => {
                e.preventDefault();
                const touch = e.touches[0];
                handleMouseDown({ target: document.elementFromPoint(touch.clientX, touch.clientY) });
            });
            boardElement.addEventListener('touchmove', (e) => {
                e.preventDefault();
                const touch = e.touches[0];
                handleMouseMove({ target: document.elementFromPoint(touch.clientX, touch.clientY) });
            });
            boardElement.addEventListener('touchend', handleMouseUp);
            boardElement.addEventListener('touchcancel', handleMouseUp);

            messageButton.addEventListener('click', newGame);

            // Initial game start
            newGame();
        });
    </script>
</body>
</html>
