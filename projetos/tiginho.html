<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo do Tigrinho - Cassino</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts: Poppins -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: radial-gradient(circle, #4a0e72, #1b022c);
            overflow: hidden;
        }
        
        /* Estilos para o brilho e animações */
        .slot {
            transition: transform 0.1s ease-in-out;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.7);
        }
        .spinning {
            animation: spin-anim 0.1s linear infinite;
        }
        @keyframes spin-anim {
            0% { transform: translateY(-15%); }
            100% { transform: translateY(15%); }
        }

        .win-line {
            position: absolute;
            left: 0;
            width: 100%;
            height: 5px;
            background-color: rgba(255, 215, 0, 0.8);
            box-shadow: 0 0 15px 5px rgba(255, 215, 0, 0.7);
            border-radius: 5px;
            animation: flash 1.5s ease-in-out;
        }
        
        @keyframes flash {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.2; }
        }

        .win-line-h-1 { top: 16.66%; }
        .win-line-h-2 { top: 50%; }
        .win-line-h-3 { top: 83.33%; }

        .win-line-v-1 { left: 16.66%; top: 0; width: 5px; height: 100%; }
        .win-line-v-2 { left: 50%; top: 0; width: 5px; height: 100%; }
        .win-line-v-3 { left: 83.33%; top: 0; width: 5px; height: 100%; }

        .win-line-d-1 {
            top: 0;
            left: 0;
            height: 5px;
            width: 141.42%; /* sqrt(2) * 100% */
            transform-origin: top left;
            transform: rotate(45deg) scaleX(1.1) translate(10px, -15px);
        }
        .win-line-d-2 {
            top: 0;
            right: 0;
            height: 5px;
            width: 141.42%;
            transform-origin: top right;
            transform: rotate(-45deg) scaleX(1.1) translate(-10px, -15px);
        }

        /* Botão com gradiente e efeito de pulso */
        .spin-button {
            background: linear-gradient(145deg, #f9a825, #e65100);
            box-shadow: 0 5px 15px rgba(249, 168, 37, 0.4);
            transition: all 0.2s ease-in-out;
            animation: pulse-button 2s infinite;
        }
        .spin-button:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 25px rgba(249, 168, 37, 0.6);
        }
        .spin-button:disabled {
            background: #555;
            box-shadow: none;
            cursor: not-allowed;
            animation: none;
        }
        @keyframes pulse-button {
            0% { transform: scale(1); }
            50% { transform: scale(1.03); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body class="flex justify-center items-center min-h-screen text-white p-4">

    <div class="w-full max-w-md mx-auto bg-black bg-opacity-40 rounded-3xl shadow-2xl p-6 border-2 border-purple-500/50">
        
        <!-- Título -->
        <div class="text-center mb-4">
            <h1 class="text-4xl font-extrabold text-yellow-400" style="text-shadow: 0 0 10px #f9a825;">Jogo do Tigrinho</h1>
        </div>

        <!-- Grelha do Jogo -->
        <div id="slot-machine" class="relative grid grid-cols-3 gap-4 bg-purple-900/50 p-4 rounded-2xl border-2 border-yellow-400/50 mb-6 aspect-square">
            <!-- As células serão preenchidas por JS -->
        </div>

        <!-- Mensagem de Resultado -->
        <div id="result-message" class="text-center h-10 mb-4 text-2xl font-bold transition-all duration-300"></div>

        <!-- Painel de Controlo -->
        <div class="bg-black bg-opacity-50 p-4 rounded-2xl space-y-4">
            <!-- Saldo e Aposta -->
            <div class="flex justify-around text-center">
                <div>
                    <p class="text-sm text-gray-400">SALDO</p>
                    <p id="balance" class="text-2xl font-bold text-green-400">R$ 100.00</p>
                </div>
                <div>
                    <p class="text-sm text-gray-400">APOSTA</p>
                    <p id="bet-amount-display" class="text-2xl font-bold text-yellow-400">R$ 1.00</p>
                </div>
            </div>

            <!-- Controlo de Aposta -->
            <div class="flex items-center justify-center gap-4">
                <button id="decrease-bet" class="bg-purple-700 hover:bg-purple-800 rounded-full w-12 h-12 text-3xl font-bold transition-colors">-</button>
                <span class="text-lg">Valor da Aposta</span>
                <button id="increase-bet" class="bg-purple-700 hover:bg-purple-800 rounded-full w-12 h-12 text-3xl font-bold transition-colors">+</button>
            </div>

            <!-- Botão de Girar -->
            <button id="spin-button" class="w-full py-4 text-2xl font-bold text-white uppercase rounded-xl spin-button">
                Girar
            </button>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // --- Configuração Inicial ---
            const slotMachine = document.getElementById('slot-machine');
            const spinButton = document.getElementById('spin-button');
            const balanceDisplay = document.getElementById('balance');
            const betAmountDisplay = document.getElementById('bet-amount-display');
            const increaseBetBtn = document.getElementById('increase-bet');
            const decreaseBetBtn = document.getElementById('decrease-bet');
            const resultMessage = document.getElementById('result-message');

            const symbols = [
                { name: 'Laranja', emoji: '🍊', payout: 2 },
                { name: 'Saco de Moedas', emoji: '💰', payout: 5 },
                { name: 'Amuleto', emoji: '🧧', payout: 8 },
                { name: 'Bomba', emoji: '💣', payout: 15 },
                { name: 'Tigre', emoji: '🐅', payout: 50 } // Símbolo de maior valor
            ];

            const betOptions = [0.50, 1.00, 2.00, 5.00, 10.00, 20.00];
            let currentBetIndex = 1;

            let balance = 100.00;
            let isSpinning = false;

            const paylines = [
                // Horizontais
                [0, 1, 2], [3, 4, 5], [6, 7, 8],
                // Verticais
                [0, 3, 6], [1, 4, 7], [2, 5, 8],
                // Diagonais
                [0, 4, 8], [2, 4, 6]
            ];

            // --- Funções do Jogo ---

            function initializeGrid() {
                slotMachine.innerHTML = '';
                for (let i = 0; i < 9; i++) {
                    const slot = document.createElement('div');
                    slot.classList.add('slot', 'flex', 'justify-center', 'items-center', 'text-5xl', 'md:text-6xl', 'bg-purple-800/50', 'rounded-lg', 'aspect-square');
                    slot.textContent = '❓';
                    slotMachine.appendChild(slot);
                }
            }

            function updateDisplays() {
                balanceDisplay.textContent = `R$ ${balance.toFixed(2)}`;
                betAmountDisplay.textContent = `R$ ${betOptions[currentBetIndex].toFixed(2)}`;
            }

            function changeBet(direction) {
                if (isSpinning) return;
                currentBetIndex += direction;
                if (currentBetIndex < 0) currentBetIndex = 0;
                if (currentBetIndex >= betOptions.length) currentBetIndex = betOptions.length - 1;
                updateDisplays();
            }

            function spin() {
                if (isSpinning || balance < betOptions[currentBetIndex]) {
                    if(balance < betOptions[currentBetIndex]) {
                        showMessage("Saldo insuficiente!", "red");
                    }
                    return;
                }

                isSpinning = true;
                spinButton.disabled = true;
                spinButton.textContent = "GIRANDO...";
                resultMessage.textContent = '';
                clearWinLines();

                balance -= betOptions[currentBetIndex];
                updateDisplays();

                const slots = Array.from(slotMachine.children);
                let spinCount = 0;

                const spinInterval = setInterval(() => {
                    slots.forEach(slot => {
                        slot.textContent = symbols[Math.floor(Math.random() * symbols.length)].emoji;
                        slot.classList.add('spinning');
                    });
                    spinCount++;
                    if (spinCount > 15) { // Duração da animação de giro
                        clearInterval(spinInterval);
                        endSpin();
                    }
                }, 100);
            }

            function endSpin() {
                const finalGrid = Array.from({ length: 9 }, () => symbols[Math.floor(Math.random() * symbols.length)]);
                const slots = Array.from(slotMachine.children);

                slots.forEach((slot, index) => {
                    slot.textContent = finalGrid[index].emoji;
                    slot.classList.remove('spinning');
                });

                checkWin(finalGrid);
                isSpinning = false;
                spinButton.disabled = false;
                spinButton.textContent = "Girar";
            }
            
            function checkWin(grid) {
                let totalWin = 0;
                let winningLinesFound = [];

                for (let i = 0; i < paylines.length; i++) {
                    const line = paylines[i];
                    const s1 = grid[line[0]];
                    const s2 = grid[line[1]];
                    const s3 = grid[line[2]];

                    if (s1.emoji === s2.emoji && s2.emoji === s3.emoji) {
                        const winAmount = betOptions[currentBetIndex] * s1.payout;
                        totalWin += winAmount;
                        winningLinesFound.push(i);
                    }
                }

                if (totalWin > 0) {
                    balance += totalWin;
                    showMessage(`GANHOU R$ ${totalWin.toFixed(2)}!`, 'green');
                    winningLinesFound.forEach(lineIndex => highlightWinLine(lineIndex));
                } else {
                    showMessage("Tente novamente!", "yellow");
                }
                updateDisplays();
            }

            function showMessage(msg, color) {
                resultMessage.textContent = msg;
                resultMessage.style.color = {
                    'green': '#4ade80', // green-400
                    'red': '#f87171',   // red-400
                    'yellow': '#facc15' // yellow-400
                }[color];
                resultMessage.style.textShadow = `0 0 10px ${resultMessage.style.color}`;
            }

            function highlightWinLine(lineIndex) {
                const lineDiv = document.createElement('div');
                lineDiv.classList.add('win-line');
                
                // h: horizontal, v: vertical, d: diagonal
                const lineType = 
                    lineIndex < 3 ? 'h' :
                    lineIndex < 6 ? 'v' : 'd';
                
                const lineNum = (lineIndex % 3) + 1;

                lineDiv.classList.add(`win-line-${lineType}-${lineNum}`);
                slotMachine.appendChild(lineDiv);
            }

            function clearWinLines() {
                const lines = slotMachine.querySelectorAll('.win-line');
                lines.forEach(line => line.remove());
            }

            // --- Event Listeners ---
            increaseBetBtn.addEventListener('click', () => changeBet(1));
            decreaseBetBtn.addEventListener('click', () => changeBet(-1));
            spinButton.addEventListener('click', spin);

            // --- Inicialização ---
            initializeGrid();
            updateDisplays();
        });
    </script>
</body>
</html>
