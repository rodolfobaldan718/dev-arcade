<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Clientes</title>
    <!-- Tailwind CSS para estilização -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Fonte Inter do Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* Define a fonte Inter como padrão */
        body {
            font-family: 'Inter', sans-serif;
        }
        /* Estilo para a animação de carregamento */
        .loader {
            border: 4px solid #f3f3f3;
            border-radius: 50%;
            border-top: 4px solid #3498db;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="bg-gray-100 text-gray-800">

    <div class="container mx-auto p-4 sm:p-6 lg:p-8 max-w-4xl">
        <header class="text-center mb-8">
            <h1 class="text-3xl sm:text-4xl font-bold text-gray-900">Gestão de Clientes</h1>
            <p class="text-md text-gray-600 mt-2">Adicione, visualize e gerencie as informações dos seus clientes.</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <!-- Coluna do Formulário de Cadastro -->
            <div class="bg-white p-6 rounded-lg shadow-md">
                <h2 class="text-2xl font-semibold mb-6 border-b pb-4">Cadastrar Novo Cliente</h2>
                <form id="client-form">
                    <div class="mb-4">
                        <label for="name" class="block text-sm font-medium text-gray-700 mb-1">Nome Completo</label>
                        <input type="text" id="name" name="name" required class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500 transition duration-150" placeholder="Ex: João da Silva">
                    </div>
                    <div class="mb-4">
                        <label for="email" class="block text-sm font-medium text-gray-700 mb-1">E-mail</label>
                        <input type="email" id="email" name="email" required class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500 transition duration-150" placeholder="Ex: joao.silva@email.com">
                    </div>
                    <div class="mb-6">
                        <label for="phone" class="block text-sm font-medium text-gray-700 mb-1">Telefone</label>
                        <input type="tel" id="phone" name="phone" class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500 transition duration-150" placeholder="Ex: (11) 99999-8888">
                    </div>
                    <button type="submit" id="submit-button" class="w-full bg-blue-600 text-white font-bold py-2 px-4 rounded-md hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition duration-150 flex items-center justify-center">
                        <span id="button-text">Salvar Cliente</span>
                        <div id="button-loader" class="loader hidden ml-2"></div>
                    </button>
                </form>
                 <!-- Caixa de mensagem para feedback -->
                <div id="message-box" class="mt-4 p-3 rounded-md text-center text-sm hidden"></div>
            </div>

            <!-- Coluna da Lista de Clientes -->
            <div class="bg-white p-6 rounded-lg shadow-md">
                <h2 class="text-2xl font-semibold mb-6 border-b pb-4">Clientes Cadastrados</h2>
                <div id="clients-list" class="space-y-4">
                    <!-- Mensagem de carregamento inicial -->
                    <p id="loading-clients" class="text-gray-500">Carregando clientes...</p>
                    <!-- Os clientes serão inseridos aqui dinamicamente -->
                </div>
            </div>
        </div>
        <footer class="text-center mt-12 text-sm text-gray-500">
            <p>Seu ID de usuário: <span id="user-id-display" class="font-mono bg-gray-200 p-1 rounded"></span></p>
            <p class="mt-2">Este ID é único para você e garante que seus dados sejam privados.</p>
        </footer>
    </div>

    <!-- Módulos do Firebase -->
    <script type="module">
        // Importa as funções necessárias do SDK do Firebase
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Configuração do Firebase (será preenchida pelo ambiente)
        const firebaseConfig = typeof __firebase_config !== 'undefined' 
            ? JSON.parse(__firebase_config) 
            : { apiKey: "YOUR_API_KEY", authDomain: "YOUR_AUTH_DOMAIN", projectId: "YOUR_PROJECT_ID" };

        // ID da aplicação (será preenchido pelo ambiente)
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';

        // Inicializa o Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let userId = null; // Variável para armazenar o ID do usuário
        let clientsCollectionRef; // Referência para a coleção de clientes

        // Elementos do DOM
        const clientForm = document.getElementById('client-form');
        const clientsList = document.getElementById('clients-list');
        const loadingClients = document.getElementById('loading-clients');
        const userIdDisplay = document.getElementById('user-id-display');
        const submitButton = document.getElementById('submit-button');
        const buttonText = document.getElementById('button-text');
        const buttonLoader = document.getElementById('button-loader');
        const messageBox = document.getElementById('message-box');

        /**
         * Mostra uma mensagem de feedback para o usuário.
         * @param {string} message - A mensagem a ser exibida.
         * @param {boolean} isError - Se a mensagem é de erro ou sucesso.
         */
        function showMessage(message, isError = false) {
            messageBox.textContent = message;
            messageBox.classList.remove('hidden', 'bg-green-100', 'text-green-800', 'bg-red-100', 'text-red-800');
            if (isError) {
                messageBox.classList.add('bg-red-100', 'text-red-800');
            } else {
                messageBox.classList.add('bg-green-100', 'text-green-800');
            }
            // Esconde a mensagem após 5 segundos
            setTimeout(() => {
                messageBox.classList.add('hidden');
            }, 5000);
        }
        
        /**
         * Renderiza a lista de clientes na tela.
         * @param {Array} clients - Um array de objetos de cliente.
         */
        function renderClients(clients) {
            clientsList.innerHTML = ''; // Limpa a lista antes de renderizar
            if (clients.length === 0) {
                clientsList.innerHTML = '<p class="text-gray-500">Nenhum cliente cadastrado ainda.</p>';
            } else {
                clients.forEach(client => {
                    const clientElement = document.createElement('div');
                    clientElement.className = 'p-4 border rounded-md bg-gray-50 flex justify-between items-center';
                    clientElement.innerHTML = `
                        <div>
                            <p class="font-semibold text-gray-800">${client.name}</p>
                            <p class="text-sm text-gray-600">${client.email}</p>
                            <p class="text-sm text-gray-600">${client.phone}</p>
                        </div>
                        <button data-id="${client.id}" class="delete-btn text-red-500 hover:text-red-700 transition-colors">&times;</button>
                    `;
                    clientsList.appendChild(clientElement);
                });
            }
        }

        // Monitora o estado da autenticação
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                console.log("Usuário autenticado:", user.uid);
                userId = user.uid;
                userIdDisplay.textContent = userId;

                // Define o caminho da coleção de clientes para este usuário
                const collectionPath = `/artifacts/${appId}/users/${userId}/clients`;
                clientsCollectionRef = collection(db, collectionPath);
                
                // Configura o listener em tempo real para a coleção de clientes
                const q = query(clientsCollectionRef);
                onSnapshot(q, (querySnapshot) => {
                    const clients = [];
                    querySnapshot.forEach((doc) => {
                        clients.push({ id: doc.id, ...doc.data() });
                    });
                    renderClients(clients);
                    loadingClients.style.display = 'none'; // Esconde a mensagem de carregamento
                }, (error) => {
                    console.error("Erro ao buscar clientes: ", error);
                    showMessage("Erro ao carregar a lista de clientes.", true);
                    loadingClients.textContent = 'Erro ao carregar clientes.';
                });

            } else {
                console.log("Nenhum usuário autenticado. Tentando login...");
                // Se o token inicial estiver disponível, usa-o. Senão, faz login anônimo.
                try {
                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        await signInWithCustomToken(auth, __initial_auth_token);
                    } else {
                        await signInAnonymously(auth);
                    }
                } catch (error) {
                    console.error("Erro na autenticação:", error);
                    showMessage("Falha na autenticação. Não é possível salvar ou carregar dados.", true);
                }
            }
        });

        // Manipula o envio do formulário
        clientForm.addEventListener('submit', async (e) => {
            e.preventDefault(); // Impede o recarregamento da página

            if (!userId) {
                showMessage("Erro: Usuário não autenticado. Tente recarregar a página.", true);
                return;
            }

            // Mostra o loader e desabilita o botão
            buttonText.textContent = 'Salvando...';
            buttonLoader.classList.remove('hidden');
            submitButton.disabled = true;

            const name = clientForm.name.value;
            const email = clientForm.email.value;
            const phone = clientForm.phone.value;

            try {
                // Adiciona um novo documento à coleção de clientes
                const docRef = await addDoc(clientsCollectionRef, {
                    name: name,
                    email: email,
                    phone: phone,
                    createdAt: new Date() // Adiciona um timestamp de quando foi criado
                });
                console.log("Documento salvo com ID: ", docRef.id);
                showMessage("Cliente cadastrado com sucesso!", false);
                clientForm.reset(); // Limpa o formulário
            } catch (error) {
                console.error("Erro ao adicionar documento: ", error);
                showMessage("Ocorreu um erro ao salvar o cliente.", true);
            } finally {
                // Esconde o loader e reabilita o botão
                buttonText.textContent = 'Salvar Cliente';
                buttonLoader.classList.add('hidden');
                submitButton.disabled = false;
            }
        });

        // Manipula o clique no botão de deletar usando delegação de eventos
        clientsList.addEventListener('click', async (e) => {
            if (e.target && e.target.classList.contains('delete-btn')) {
                const docId = e.target.getAttribute('data-id');
                if (docId) {
                    try {
                        // Deleta o documento do Firestore
                        await deleteDoc(doc(db, `/artifacts/${appId}/users/${userId}/clients`, docId));
                        showMessage("Cliente removido com sucesso.", false);
                    } catch (error) {
                        console.error("Erro ao remover o cliente: ", error);
                        showMessage("Erro ao remover o cliente.", true);
                    }
                }
            }
        });

    </script>
</body>
</html>
