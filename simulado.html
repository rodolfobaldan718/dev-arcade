<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saber em Foco - Site de Simulados com IA</title>
    
    <!-- Tailwind CSS para estilização -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Lucide Icons para ícones -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        /* Estilos básicos para a página */
        html, body {
            margin: 0;
            font-family: sans-serif;
        }
        body {
            background-color: #f9fafb; /* bg-gray-50 */
        }
        /* Animação de carregamento */
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .animate-spin {
            animation: spin 1s linear infinite;
        }
        /* Estilos para o modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 50;
        }
        #drawing-canvas {
            touch-action: none; /* Previne a rolagem da página ao desenhar no mobile */
        }
    </style>
    <script>
        // Configuração do Tailwind para usar o modo escuro baseado em classe
        tailwind.config = {
          darkMode: 'class',
        }
        
        // Lógica do Modo Escuro (executa antes de tudo para evitar piscar a tela)
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
          document.documentElement.classList.add('dark')
        } else {
          document.documentElement.classList.remove('dark')
        }
    </script>
</head>
<body class="bg-gray-50 dark:bg-gray-900">

    <!-- Contêiner principal da aplicação -->
    <div id="app" class="w-full py-8 px-4"></div>

    <!-- Modal do Rascunho / Paint -->
    <div id="scratchpad-modal" class="modal-overlay hidden">
        <div id="scratchpad-container" class="bg-white dark:bg-gray-800 rounded-lg shadow-xl p-4 w-full max-w-md relative resize overflow-hidden min-w-[320px] flex flex-col" style="height: 500px;">
            <div class="flex justify-between items-center mb-4 flex-shrink-0">
                <h2 class="text-xl font-bold text-gray-800 dark:text-gray-100">Rascunho</h2>
                <button id="close-scratchpad-btn" class="p-2 rounded-full hover:bg-gray-200 dark:hover:bg-gray-700">
                    <i data-lucide="x" class="text-gray-600 dark:text-gray-300"></i>
                </button>
            </div>
            <div class="flex-grow relative border border-gray-300 dark:border-gray-600 rounded-md">
                 <canvas id="drawing-canvas" class="absolute top-0 left-0 w-full h-full cursor-crosshair"></canvas>
            </div>
            <div id="canvas-controls" class="flex items-center justify-between mt-4 flex-shrink-0">
                <div class="flex items-center gap-2">
                    <button data-color="black" class="color-btn w-8 h-8 rounded-full bg-black border-2 border-blue-500"></button>
                    <button data-color="red" class="color-btn w-8 h-8 rounded-full bg-red-500 border-2 border-transparent"></button>
                    <button data-color="blue" class="color-btn w-8 h-8 rounded-full bg-blue-500 border-2 border-transparent"></button>
                    <button data-tool="eraser" class="color-btn w-8 h-8 rounded-full bg-white border-2 border-gray-400 dark:border-gray-500 flex items-center justify-center">
                        <i data-lucide="eraser" class="w-5 h-5 text-gray-600 dark:text-gray-300 pointer-events-none"></i>
                    </button>
                </div>
                <button id="clear-canvas-btn" class="bg-red-500 hover:bg-red-600 text-white font-semibold py-2 px-4 rounded-lg flex items-center gap-2">
                    <i data-lucide="trash-2" class="w-5 h-5"></i>
                    <span>Limpar</span>
                </button>
            </div>
            <div id="resize-handle" class="absolute bottom-0 right-0 w-4 h-4 cursor-se-resize">
                 <svg width="100%" height="100%" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M16 0V16H0L16 0Z" fill="#a0aec0" class="dark:fill-gray-500"/>
                </svg>
            </div>
        </div>
    </div>


    <!-- Lógica da Aplicação -->
    <script>
        // --- ESTADO GLOBAL DA APLICAÇÃO ---
        let state = {
            screen: 'selection', // 'selection', 'quiz', 'results'
            quiz: [],
            currentLevel: 'fundamental',
            currentSubject: null,
            currentDifficulty: 'médio',
            score: 0,
            isLoading: false,
            error: null,
        };

        const appContainer = document.getElementById('app');

        // --- ESTRUTURA PARA OPÇÕES DE QUIZ ---
        const quizOptions = {
            fundamental: { 'Matemática': [], 'Português': [], 'Ciências': [], 'História': [], 'Geografia': [] },
            medio: { 'Matemática': [], 'Português': [], 'Ciências': [], 'História': [], 'Geografia': [], 'Biologia': [], 'Física': [], 'Química': [], 'Literatura': [], 'Filosofia': [] },
            superior: { 'Matemática': [], 'Português': [], 'Ciências': [], 'História': [], 'Geografia': [], 'Direito Constitucional': [], 'Cálculo I': [], 'Anatomia Humana': [], 'Teoria da Computação': [], 'Microeconomia': [] }
        };

        // --- FUNÇÃO PARA GERAR PERGUNTAS COM A API GEMINI ---
        async function generateQuestionsFromAPI(level, subject, difficulty) {
            const prompt = `Gere um simulado com 10 perguntas de múltipla escolha sobre o tema "${subject}" para o nível de ensino "${level}" com dificuldade "${difficulty}". As perguntas devem ser claras, objetivas e adequadas ao nível de conhecimento e dificuldade esperados. Para cada pergunta, forneça 4 opções de resposta. Apenas uma opção deve ser a correta. Inclua também uma breve explicação para a resposta correta.`;
            const chatHistory = [{ role: "user", parts: [{ text: prompt }] }];
            const payload = {
                contents: chatHistory,
                generationConfig: {
                    responseMimeType: "application/json",
                    responseSchema: { type: "OBJECT", properties: { questions: { type: "ARRAY", items: { type: "OBJECT", properties: { question: { type: "STRING" }, options: { type: "ARRAY", items: { type: "STRING" } }, answer: { type: "STRING" }, explanation: { type: "STRING" } }, required: ["question", "options", "answer", "explanation"] } } }, required: ["questions"] }
                }
            };
            try {
                // IMPORTANTE: A geração de perguntas com IA requer uma API Key.
                // Para uso local, você precisará criar sua própria API Key no Google AI Studio
                // e substituir a string vazia abaixo.
                const apiKey = "AIzaSyDegiNCeqQ_ximsRoZrJA_94Uxa2fCuYxk"; // <-- SUBSTITUA PELA SUA API KEY DO GOOGLE AI STUDIO
                if (!apiKey) {
                    alert("API Key do Gemini não configurada. As perguntas não podem ser geradas.");
                    return null;
                }
                const apiUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-05-20:generateContent?key=${apiKey}`;
                const response = await fetch(apiUrl, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
                if (!response.ok) throw new Error(`API error: ${response.statusText}`);
                const result = await response.json();
                if (result.candidates?.[0]?.content?.parts?.[0]) {
                    const jsonText = result.candidates[0].content.parts[0].text;
                    const parsedJson = JSON.parse(jsonText);
                    if (parsedJson.questions?.length > 0) return parsedJson.questions;
                }
                throw new Error("A resposta da API não continha perguntas válidas.");
            } catch (error) {
                console.error("Erro ao gerar perguntas:", error);
                return null;
            }
        }

        // --- FUNÇÕES DE RENDERIZAÇÃO (TEMPLATES HTML) ---

        function renderSelectionScreen() {
            const availableSubjects = Object.keys(quizOptions[state.currentLevel || 'fundamental'] || {});
            return `
                <div class="w-full max-w-5xl mx-auto p-4 md:p-8">
                    <header class="relative text-center mb-8">
                         <div class="absolute top-0 right-0">
                            <button id="theme-toggle-btn" class="p-2 rounded-full bg-gray-200 dark:bg-gray-700 text-gray-800 dark:text-gray-200">
                                <i data-lucide="sun" class="hidden dark:inline"></i>
                                <i data-lucide="moon" class="inline dark:hidden"></i>
                            </button>
                        </div>
                        <h1 class="text-4xl md:text-5xl font-extrabold text-gray-800 dark:text-gray-100 mb-2">Saber em Foco</h1>
                        <p class="text-lg text-gray-500 dark:text-gray-400">Teste seus conhecimentos com perguntas geradas por IA.</p>
                    </header>
                    <section class="mb-8">
                        <h2 class="text-xl font-bold text-center text-gray-700 dark:text-gray-300 mb-4">1. Escolha o nível de ensino</h2>
                        <div id="level-selector" class="flex justify-center space-x-2 md:space-x-4 bg-gray-100 dark:bg-gray-800 p-2 rounded-full">
                            ${['fundamental', 'medio', 'superior'].map(l => `
                                <button data-level="${l}" class="level-btn px-4 py-2 md:px-6 md:py-3 text-sm md:text-base font-bold rounded-full transition-colors duration-300 ${state.currentLevel === l ? 'bg-blue-600 text-white shadow-md' : 'text-gray-600 dark:text-gray-300 hover:bg-gray-200 dark:hover:bg-gray-700'}">
                                    ${l.charAt(0).toUpperCase() + l.slice(1)}
                                </button>
                            `).join('')}
                        </div>
                    </section>
                    <section class="mb-8">
                        <h2 class="text-xl font-bold text-center text-gray-700 dark:text-gray-300 mb-4">2. Escolha a matéria</h2>
                        <div id="subject-selector" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4">
                            ${availableSubjects.map(s => `
                                <button data-subject="${s}" class="subject-btn p-4 md:p-6 border-2 rounded-xl flex flex-col items-center justify-center text-center transition-all duration-200 transform hover:-translate-y-1 hover:shadow-lg ${state.currentSubject === s ? 'bg-blue-500 border-blue-600 text-white shadow-xl' : 'bg-white dark:bg-gray-800 border-gray-200 dark:border-gray-700 hover:border-blue-400 dark:hover:border-blue-500'}">
                                    <i data-lucide="book" class="w-8 h-8 md:w-10 md:h-10 text-current"></i>
                                    <span class="mt-2 font-semibold text-sm md:text-base text-gray-800 dark:text-gray-200">${s}</span>
                                </button>
                            `).join('')}
                        </div>
                    </section>
                    <section class="mb-8">
                        <h2 class="text-xl font-bold text-center text-gray-700 dark:text-gray-300 mb-4">3. Escolha a dificuldade</h2>
                        <div id="difficulty-selector" class="flex justify-center space-x-2 md:space-x-4 bg-gray-100 dark:bg-gray-800 p-2 rounded-full">
                            ${['fácil', 'médio', 'difícil'].map(d => `
                                <button data-difficulty="${d}" class="difficulty-btn px-4 py-2 md:px-6 md:py-3 text-sm md:text-base font-bold rounded-full transition-colors duration-300 ${state.currentDifficulty === d ? 'bg-blue-600 text-white shadow-md' : 'text-gray-600 dark:text-gray-300 hover:bg-gray-200 dark:hover:bg-gray-700'}">
                                    ${d.charAt(0).toUpperCase() + d.slice(1)}
                                </button>
                            `).join('')}
                        </div>
                    </section>
                    <div id="selection-error" class="mt-6 text-center p-4 bg-red-100 text-red-700 rounded-lg ${state.error ? '' : 'hidden'}">
                        <strong>Oops!</strong> ${state.error || ''}
                    </div>
                    <footer class="mt-10 text-center">
                        <button id="start-quiz-btn" ${!state.currentSubject ? 'disabled' : ''} class="bg-blue-600 text-white font-bold py-4 px-10 rounded-full text-lg transition-all duration-300 transform hover:scale-105 shadow-lg disabled:bg-gray-300 disabled:cursor-not-allowed disabled:scale-100 flex items-center justify-center mx-auto w-64 h-16">
                            <i data-lucide="arrow-right" class="mr-2 w-6 h-6"></i> Iniciar Simulado
                        </button>
                    </footer>
                </div>
            `;
        }
        
        function renderQuizScreen() {
            const answeredCount = state.quiz.filter(q => q.answered).length;
            const progress = (answeredCount / state.quiz.length) * 100;

            return `
                <div class="w-full max-w-3xl mx-auto p-4 md:p-8">
                    <header class="text-center mb-8">
                        <h1 class="text-3xl font-bold text-gray-800 dark:text-gray-100">${state.currentSubject}</h1>
                        <p class="text-gray-500 dark:text-gray-400 capitalize">${state.currentLevel} - ${state.currentDifficulty}</p>
                    </header>
                    <div class="sticky top-4 z-10 bg-gray-50/80 dark:bg-gray-900/80 backdrop-blur-sm py-2 mb-4">
                        <div class="w-full bg-gray-200 dark:bg-gray-700 rounded-full h-2.5">
                            <div id="progress-bar-fill" class="bg-blue-600 h-2.5 rounded-full transition-all duration-500" style="width: ${progress}%"></div>
                        </div>
                        <p id="progress-text" class="text-sm text-center text-gray-600 dark:text-gray-400 mt-2">${answeredCount} de ${state.quiz.length} respondidas</p>
                    </div>
                    <div id="questions-container">
                        ${state.quiz.map((q, index) => `
                            <div class="bg-white dark:bg-gray-800 p-6 rounded-xl shadow-md border border-gray-200 dark:border-gray-700 mb-6">
                                <div class="flex justify-between items-start">
                                    <h3 class="text-lg font-semibold text-gray-800 dark:text-gray-100 mb-4 flex-1"><span class="text-blue-600 dark:text-blue-400 font-bold mr-2">${index + 1}.</span>${q.question}</h3>
                                    <button class="open-scratchpad-btn ml-4 p-2 rounded-full hover:bg-gray-200 dark:hover:bg-gray-700 text-gray-600 dark:text-gray-300">
                                        <i data-lucide="calculator" class="w-5 h-5"></i>
                                    </button>
                                </div>
                                <div class="space-y-3">
                                    ${q.options.map(option => `
                                        <button data-question-index="${index}" data-option="${option}" class="option-btn w-full text-left p-4 border-2 rounded-lg transition-colors duration-200 flex items-center justify-between bg-white dark:bg-gray-800 hover:bg-blue-50 dark:hover:bg-gray-700 border-gray-300 dark:border-gray-600 text-gray-800 dark:text-gray-200">
                                            <span>${option}</span>
                                        </button>
                                    `).join('')}
                                </div>
                                <div id="explanation-${index}" class="hidden mt-4 p-4 rounded-r-lg">
                                    <h4 class="font-bold">Explicação:</h4>
                                    <p>${q.explanation}</p>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                    <footer id="quiz-footer" class="mt-8 text-center ${answeredCount === state.quiz.length ? '' : 'hidden'}">
                        <button id="show-results-btn" class="bg-green-600 text-white font-bold py-4 px-10 rounded-full text-lg transition-all duration-300 transform hover:scale-105 shadow-lg">Ver Resultado</button>
                    </footer>
                </div>
            `;
        }

        function renderResultsScreen() {
            const total = state.quiz.length;
            const percentage = total > 0 ? Math.round((state.score / total) * 100) : 0;
            let feedback = { message: "Continue praticando!", color: "red" };
            if (percentage >= 90) feedback = { message: "Excelente!", color: "green" };
            else if (percentage >= 70) feedback = { message: "Muito bem!", color: "blue" };
            else if (percentage >= 50) feedback = { message: "Bom esforço!", color: "yellow" };
            
            const colorHex = { green: '4ade80', blue: '60a5fa', yellow: 'facc15', red: 'f87171' }[feedback.color];

            return `
                <div class="w-full max-w-2xl mx-auto p-4 md:p-8 text-center flex flex-col items-center justify-center h-full">
                    <div class="bg-white dark:bg-gray-800 p-8 rounded-2xl shadow-2xl border border-gray-200 dark:border-gray-700 w-full">
                        <h1 class="text-2xl font-bold text-gray-800 dark:text-gray-100 mb-2">Simulado Concluído!</h1>
                        <p class="text-gray-500 dark:text-gray-400 mb-6">Veja seu desempenho abaixo.</p>
                        <div class="relative w-48 h-48 mx-auto mb-6">
                            <svg class="w-full h-full" viewBox="0 0 36 36" transform="rotate(-90 18 18)">
                                <circle cx="18" cy="18" r="15.9155" fill="none" stroke="#e6e6e6" class="dark:stroke-gray-700" stroke-width="3" />
                                <circle cx="18" cy="18" r="15.9155" fill="none" stroke="#${colorHex}" stroke-width="3" stroke-dasharray="${percentage}, 100" stroke-linecap="round" />
                            </svg>
                            <div class="absolute inset-0 flex flex-col items-center justify-center">
                                <span class="text-5xl font-bold text-gray-800 dark:text-gray-100">${state.score}</span>
                                <span class="text-lg text-gray-500 dark:text-gray-400">/${total}</span>
                            </div>
                        </div>
                        <h2 class="text-3xl font-bold text-${feedback.color}-500 mb-4">${feedback.message}</h2>
                        <p class="text-lg text-gray-600 dark:text-gray-300 mb-8">Você acertou ${percentage}% das questões.</p>
                        <div class="flex flex-col sm:flex-row justify-center gap-4">
                            <button id="restart-quiz-btn" class="w-full sm:w-auto bg-blue-600 text-white font-semibold py-3 px-6 rounded-full text-base transition-all duration-300 transform hover:scale-105 shadow-md flex items-center justify-center">
                                <i data-lucide="rotate-cw" class="mr-2 w-5 h-5"></i> Tentar Novamente
                            </button>
                            <button id="select-new-quiz-btn" class="w-full sm:w-auto bg-gray-200 dark:bg-gray-700 text-gray-800 dark:text-gray-200 font-semibold py-3 px-6 rounded-full text-base transition-all duration-300 transform hover:scale-105 hover:bg-gray-300 dark:hover:bg-gray-600 flex items-center justify-center">
                                <i data-lucide="home" class="mr-2 w-5 h-5"></i> Escolher Outra Matéria
                            </button>
                        </div>
                    </div>
                </div>
            `;
        }
        
        // --- FUNÇÃO PRINCIPAL DE RENDERIZAÇÃO ---
        function render() {
            switch (state.screen) {
                case 'quiz':
                    appContainer.innerHTML = renderQuizScreen();
                    addQuizListeners();
                    break;
                case 'results':
                    appContainer.innerHTML = renderResultsScreen();
                    addResultsListeners();
                    break;
                case 'selection':
                default:
                    appContainer.innerHTML = renderSelectionScreen();
                    addSelectionListeners();
                    break;
            }
            // Recria os ícones do Lucide após cada renderização
            lucide.createIcons();
        }

        // --- FUNÇÕES PARA ADICIONAR EVENT LISTENERS ---
        function addSelectionListeners() {
            document.getElementById('theme-toggle-btn').addEventListener('click', () => {
                const isDark = document.documentElement.classList.toggle('dark');
                localStorage.theme = isDark ? 'dark' : 'light';
            });

            document.getElementById('level-selector').addEventListener('click', (e) => {
                const levelBtn = e.target.closest('.level-btn');
                if (levelBtn) { state.currentLevel = levelBtn.dataset.level; state.currentSubject = null; render(); }
            });

            document.getElementById('subject-selector').addEventListener('click', (e) => {
                const subjectBtn = e.target.closest('.subject-btn');
                if (subjectBtn) { state.currentSubject = subjectBtn.dataset.subject; render(); }
            });

            document.getElementById('difficulty-selector').addEventListener('click', (e) => {
                const difficultyBtn = e.target.closest('.difficulty-btn');
                if (difficultyBtn) { state.currentDifficulty = difficultyBtn.dataset.difficulty; render(); }
            });

            document.getElementById('start-quiz-btn').addEventListener('click', async () => {
                const startButton = document.getElementById('start-quiz-btn');
                state.isLoading = true; state.error = null; startButton.disabled = true;
                startButton.innerHTML = `<i data-lucide="loader" class="animate-spin w-8 h-8"></i>`;
                lucide.createIcons();

                const questions = await generateQuestionsFromAPI(state.currentLevel, state.currentSubject, state.currentDifficulty);
                
                state.isLoading = false;
                if (questions) {
                    state.quiz = questions.map(q => ({...q, answered: false, selected: null}));
                    state.score = 0; state.screen = 'quiz'; render();
                } else {
                    state.error = "Não foi possível gerar as perguntas. Tente novamente."; render();
                }
            });
        }
        
        function addQuizListeners() {
            document.getElementById('questions-container').addEventListener('click', (e) => {
                const optionBtn = e.target.closest('.option-btn');
                const scratchpadBtn = e.target.closest('.open-scratchpad-btn');

                if (scratchpadBtn) {
                    document.getElementById('scratchpad-modal').classList.remove('hidden');
                    if(typeof resizeCanvasFunction === 'function') {
                        resizeCanvasFunction();
                    }
                    lucide.createIcons();
                    return;
                }

                if (!optionBtn) return;

                const questionIndex = parseInt(optionBtn.dataset.questionIndex, 10);
                const selectedOption = optionBtn.dataset.option;
                const question = state.quiz[questionIndex];

                if (question.answered) return;

                question.answered = true;
                question.selected = selectedOption;
                
                const explanationBox = document.getElementById(`explanation-${questionIndex}`);
                const explanationTitle = explanationBox.querySelector('h4');
                const explanationText = explanationBox.querySelector('p');
                const isCorrect = selectedOption === question.answer;
                
                explanationBox.classList.remove('hidden');

                if (isCorrect) {
                    state.score++;
                    explanationBox.classList.add('bg-green-50', 'dark:bg-green-900/50', 'border-l-4', 'border-green-400');
                    explanationTitle.classList.add('text-green-800', 'dark:text-green-300');
                    explanationText.classList.add('text-green-700', 'dark:text-green-400');
                } else {
                    explanationBox.classList.add('bg-yellow-50', 'dark:bg-yellow-900/50', 'border-l-4', 'border-yellow-400');
                    explanationTitle.classList.add('text-yellow-800', 'dark:text-yellow-300');
                    explanationText.classList.add('text-yellow-700', 'dark:text-yellow-400');
                }

                const parentContainer = optionBtn.parentElement;
                const allOptions = parentContainer.querySelectorAll('.option-btn');
                allOptions.forEach(btn => {
                    btn.disabled = true;
                    const option = btn.dataset.option;
                    btn.classList.remove('hover:bg-blue-50', 'dark:hover:bg-gray-700');
                    if (option === question.answer) {
                        btn.classList.add('bg-green-100', 'dark:bg-green-900/50', 'border-green-500', 'dark:border-green-600', 'text-green-800', 'dark:text-green-300', 'font-bold');
                        btn.innerHTML += `<i data-lucide="check" class="w-5 h-5 text-green-600"></i>`;
                    } else if (option === selectedOption) {
                        btn.classList.add('bg-red-100', 'dark:bg-red-900/50', 'border-red-500', 'dark:border-red-600', 'text-red-800', 'dark:text-red-300', 'font-bold');
                        btn.innerHTML += `<i data-lucide="x" class="w-5 h-5 text-red-600"></i>`;
                    } else {
                        btn.classList.add('bg-gray-100', 'dark:bg-gray-700/50', 'text-gray-500', 'dark:text-gray-400', 'cursor-not-allowed');
                    }
                });
                
                const answeredCount = state.quiz.filter(q => q.answered).length;
                const progress = (answeredCount / state.quiz.length) * 100;
                document.getElementById('progress-bar-fill').style.width = `${progress}%`;
                document.getElementById('progress-text').innerText = `${answeredCount} de ${state.quiz.length} respondidas`;
                if (answeredCount === state.quiz.length) document.getElementById('quiz-footer').classList.remove('hidden');
                lucide.createIcons();
            });

            const showResultsBtn = document.getElementById('show-results-btn');
            if (showResultsBtn) { showResultsBtn.addEventListener('click', () => { state.screen = 'results'; render(); }); }
        }

        function addResultsListeners() {
            document.getElementById('restart-quiz-btn').addEventListener('click', async () => {
                const restartButton = document.getElementById('restart-quiz-btn');
                restartButton.disabled = true;
                restartButton.innerHTML = `<i data-lucide="loader" class="animate-spin mr-2 w-5 h-5"></i> Carregando...`;
                lucide.createIcons();
                const questions = await generateQuestionsFromAPI(state.currentLevel, state.currentSubject, state.currentDifficulty);
                if (questions) {
                    state.quiz = questions.map(q => ({...q, answered: false, selected: null}));
                    state.score = 0; state.screen = 'quiz';
                } else {
                    state.error = "Não foi possível gerar novas perguntas. Tente novamente.";
                    state.screen = 'selection';
                }
                render();
            });

            document.getElementById('select-new-quiz-btn').addEventListener('click', () => {
                state.screen = 'selection'; state.quiz = []; state.error = null;
                state.score = 0; state.currentSubject = null; render();
            });
        }
        
        let resizeCanvasFunction;
        function setupScratchpad() {
            const modal = document.getElementById('scratchpad-modal');
            const container = document.getElementById('scratchpad-container');
            const closeBtn = document.getElementById('close-scratchpad-btn');
            const canvas = document.getElementById('drawing-canvas');
            const controls = document.getElementById('canvas-controls');
            const clearBtn = document.getElementById('clear-canvas-btn');
            const resizeHandle = document.getElementById('resize-handle');
            const ctx = canvas.getContext('2d');

            let isDrawing = false;
            let lastX = 0;
            let lastY = 0;
            let penColor = 'black';
            let penWidth = 2;

            resizeCanvasFunction = function() {
                const tempCanvas = document.createElement('canvas');
                const tempCtx = tempCanvas.getContext('2d');
                tempCanvas.width = canvas.width;
                tempCanvas.height = canvas.height;
                if(canvas.width > 0 && canvas.height > 0) {
                    tempCtx.drawImage(canvas, 0, 0);
                }

                canvas.width = canvas.clientWidth;
                canvas.height = canvas.clientHeight;
                
                if (tempCanvas.width > 0 && tempCanvas.height > 0) {
                    ctx.drawImage(tempCanvas, 0, 0, tempCanvas.width, tempCanvas.height, 0, 0, canvas.width, canvas.height);
                }
            }
            
            window.addEventListener('resize', resizeCanvasFunction);

            function getPos(canvasEl, evt) {
                const rect = canvasEl.getBoundingClientRect();
                const clientX = evt.touches ? evt.touches[0].clientX : evt.clientX;
                const clientY = evt.touches ? evt.touches[0].clientY : evt.clientY;
                return {
                    x: (clientX - rect.left) * (canvasEl.width / rect.width),
                    y: (clientY - rect.top) * (canvasEl.height / rect.height)
                };
            }
            
            function startDrawing(e) {
                isDrawing = true;
                const pos = getPos(canvas, e);
                [lastX, lastY] = [pos.x, pos.y];
                e.preventDefault();
            }

            function draw(e) {
                if (!isDrawing) return;
                const pos = getPos(canvas, e);
                ctx.beginPath();
                ctx.strokeStyle = penColor;
                ctx.lineWidth = penWidth;
                ctx.lineCap = 'round';
                ctx.moveTo(lastX, lastY);
                ctx.lineTo(pos.x, pos.y);
                ctx.stroke();
                [lastX, lastY] = [pos.x, pos.y];
                e.preventDefault();
            }

            function stopDrawing() { isDrawing = false; }

            canvas.addEventListener('mousedown', startDrawing);
            canvas.addEventListener('mousemove', draw);
            canvas.addEventListener('mouseup', stopDrawing);
            canvas.addEventListener('mouseleave', stopDrawing);
            canvas.addEventListener('touchstart', startDrawing, { passive: false });
            canvas.addEventListener('touchmove', draw, { passive: false });
            canvas.addEventListener('touchend', stopDrawing);

            closeBtn.addEventListener('click', () => modal.classList.add('hidden'));
            modal.addEventListener('click', (e) => { if (e.target === modal) modal.classList.add('hidden'); });

            clearBtn.addEventListener('click', () => {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
            });

            controls.addEventListener('click', (e) => {
                const toolBtn = e.target.closest('.color-btn');
                if (toolBtn) {
                    document.querySelectorAll('.color-btn').forEach(btn => btn.classList.replace('border-blue-500', 'border-transparent'));
                    toolBtn.classList.replace('border-transparent', 'border-blue-500');

                    if (toolBtn.dataset.tool === 'eraser') {
                        ctx.globalCompositeOperation = 'destination-out';
                        penWidth = 20;
                    } else {
                        ctx.globalCompositeOperation = 'source-over';
                        penColor = toolBtn.dataset.color;
                        penWidth = 2;
                    }
                }
            });

            // Logic for resizing the modal
            let isResizing = false;
            resizeHandle.addEventListener('mousedown', (e) => {
                isResizing = true;
                const startX = e.clientX;
                const startY = e.clientY;
                const startWidth = parseInt(document.defaultView.getComputedStyle(container).width, 10);
                const startHeight = parseInt(document.defaultView.getComputedStyle(container).height, 10);

                function doDrag(e) {
                    if (!isResizing) return;
                    container.style.width = (startWidth + e.clientX - startX) + 'px';
                    container.style.height = (startHeight + e.clientY - startY) + 'px';
                    resizeCanvasFunction();
                }

                function stopDrag() {
                    isResizing = false;
                    window.removeEventListener('mousemove', doDrag);
                    window.removeEventListener('mouseup', stopDrag);
                }

                window.addEventListener('mousemove', doDrag);
                window.addEventListener('mouseup', stopDrag);
            });
        }


        // --- PONTO DE ENTRADA DA APLICAÇÃO ---
        render();
        setupScratchpad();

    </script>
</body>
</html>
