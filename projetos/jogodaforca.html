<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo da Forca com IA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .font-pixel {
            font-family: 'Press Start 2P', cursive;
        }
        .hangman-part {
            stroke: #F1FAEE;
            stroke-width: 4;
            fill: transparent;
            display: none;
        }
        .fade-in {
            animation: fadeInAnimation 0.5s ease-in forwards;
        }
        @keyframes fadeInAnimation {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="bg-gray-900 text-white flex items-center justify-center min-h-screen p-4">

    <div id="app-container" class="w-full max-w-4xl mx-auto">

        <!-- TELA DE CONFIGURAÇÃO INICIAL -->
        <div id="setup-screen" class="text-center bg-gray-800 p-8 rounded-2xl shadow-2xl fade-in">
            <h1 class="font-pixel text-3xl md:text-5xl text-cyan-400 mb-8">Jogo da Forca</h1>
            
            <!-- Container para input manual -->
            <div id="manual-input-container" class="space-y-6 max-w-lg mx-auto">
                <div>
                    <label for="secret-word-input" class="block text-lg font-semibold mb-2 text-left">Palavra ou Frase Secreta:</label>
                    <input type="password" id="secret-word-input" class="w-full bg-gray-700 border-2 border-gray-600 rounded-lg p-3 text-white focus:outline-none focus:ring-2 focus:ring-cyan-400 focus:border-transparent text-xl" placeholder="Digite aqui...">
                </div>
                <div>
                    <label for="hint-input" class="block text-lg font-semibold mb-2 text-left">Dica:</label>
                    <input type="text" id="hint-input" class="w-full bg-gray-700 border-2 border-gray-600 rounded-lg p-3 text-white focus:outline-none focus:ring-2 focus:ring-cyan-400 focus:border-transparent text-xl" placeholder="Ex: É um animal">
                </div>
                <button id="start-game-btn" class="w-full bg-cyan-500 hover:bg-cyan-600 text-gray-900 font-bold py-4 px-4 rounded-lg text-2xl transition-transform transform hover:scale-105 shadow-lg">
                    Começar a Jogar!
                </button>
                <div class="relative flex py-5 items-center">
                    <div class="flex-grow border-t border-gray-600"></div>
                    <span class="flex-shrink mx-4 text-gray-400">OU</span>
                    <div class="flex-grow border-t border-gray-600"></div>
                </div>
                <button id="ai-choice-btn" class="w-full bg-gray-600 hover:bg-gray-700 text-white font-bold py-4 px-4 rounded-lg text-2xl transition-transform transform hover:scale-105 shadow-lg">
                    Deixar a IA escolher
                </button>
            </div>

            <!-- Container para seleção de dificuldade da IA -->
            <div id="ai-difficulty-container" class="hidden space-y-6 max-w-lg mx-auto">
                 <h2 class="text-2xl font-bold text-cyan-400">Escolha a dificuldade:</h2>
                 <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                     <button data-difficulty="fácil" class="difficulty-btn w-full bg-cyan-500 hover:bg-cyan-600 text-gray-900 font-bold py-3 px-4 rounded-lg text-xl transition-transform transform hover:scale-105 shadow-lg">Fácil</button>
                     <button data-difficulty="médio" class="difficulty-btn w-full bg-cyan-500 hover:bg-cyan-600 text-gray-900 font-bold py-3 px-4 rounded-lg text-xl transition-transform transform hover:scale-105 shadow-lg">Médio</button>
                     <button data-difficulty="difícil" class="difficulty-btn w-full bg-cyan-500 hover:bg-cyan-600 text-gray-900 font-bold py-3 px-4 rounded-lg text-xl transition-transform transform hover:scale-105 shadow-lg">Difícil</button>
                 </div>
                 <button id="back-to-manual-btn" class="w-full bg-gray-600 hover:bg-gray-700 text-white font-bold py-3 px-4 rounded-lg text-lg transition-transform transform hover:scale-105 shadow-lg mt-4">
                    Voltar
                </button>
            </div>
            
            <!-- Indicador de Carregamento -->
            <div id="loading-indicator" class="hidden flex-col items-center justify-center space-y-4">
                <div class="loader"></div>
                <p class="text-lg text-cyan-300">A IA está pensando...</p>
            </div>

        </div>

        <!-- TELA PRINCIPAL DO JOGO (oculta por padrão) -->
        <div id="game-screen" class="hidden">
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 items-center">
                <div class="bg-gray-800 p-6 rounded-2xl shadow-2xl flex flex-col items-center justify-center">
                    <svg height="300" width="250" viewBox="0 0 250 300" class="mb-4">
                        <line x1="20" y1="280" x2="120" y2="280" stroke="#8D6E63" stroke-width="6" />
                        <line x1="70" y1="280" x2="70" y2="50" stroke="#8D6E63" stroke-width="6" />
                        <line x1="70" y1="50" x2="180" y2="50" stroke="#8D6E63" stroke-width="6" />
                        <line x1="180" y1="50" x2="180" y2="90" stroke="#8D6E63" stroke-width="6" />
                        <circle id="head" class="hangman-part" cx="180" cy="120" r="30" />
                        <line id="body" class="hangman-part" x1="180" y1="150" x2="180" y2="220" />
                        <line id="left-arm" class="hangman-part" x1="180" y1="170" x2="140" y2="200" />
                        <line id="right-arm" class="hangman-part" x1="180" y1="170" x2="220" y2="200" />
                        <line id="left-leg" class="hangman-part" x1="180" y1="220" x2="140" y2="260" />
                        <line id="right-leg" class="hangman-part" x1="180" y1="220" x2="220" y2="260" />
                    </svg>
                    <div id="hint-display" class="w-full text-center bg-gray-700 p-3 rounded-lg">
                        <p class="text-lg"><span class="font-bold text-cyan-400">Dica:</span> <span id="hint-text"></span></p>
                    </div>
                </div>
                <div class="flex flex-col space-y-8">
                    <div id="word-display" class="flex justify-center items-end flex-wrap gap-2 md:gap-4 min-h-[50px]"></div>
                    <div id="wrong-letters-container" class="text-center">
                        <h3 class="text-xl font-semibold mb-2">Letras Erradas:</h3>
                        <p id="wrong-letters" class="text-2xl text-red-400 font-mono h-8"></p>
                    </div>
                    <div id="keyboard" class="grid grid-cols-7 sm:grid-cols-9 gap-2"></div>
                </div>
            </div>
        </div>

        <!-- MODAL DE FIM DE JOGO (oculto por padrão) -->
        <div id="game-over-modal" class="hidden fixed inset-0 bg-black bg-opacity-75 flex items-center justify-center z-50 p-4">
            <div id="modal-content" class="bg-gray-800 p-8 rounded-2xl shadow-2xl text-center max-w-md w-full fade-in">
                <h2 id="modal-title" class="font-pixel text-4xl mb-4"></h2>
                <p id="modal-text" class="text-xl mb-6"></p>
                <button id="play-again-btn" class="w-full bg-cyan-500 hover:bg-cyan-600 text-gray-900 font-bold py-3 px-4 rounded-lg text-xl transition-transform transform hover:scale-105 shadow-lg">
                    Jogar Novamente
                </button>
            </div>
        </div>

    </div>

    <script>
        // --- ELEMENTOS DA UI ---
        const setupScreen = document.getElementById('setup-screen');
        const gameScreen = document.getElementById('game-screen');
        const manualInputContainer = document.getElementById('manual-input-container');
        const aiDifficultyContainer = document.getElementById('ai-difficulty-container');
        const loadingIndicator = document.getElementById('loading-indicator');
        const secretWordInput = document.getElementById('secret-word-input');
        const hintInput = document.getElementById('hint-input');
        const startGameBtn = document.getElementById('start-game-btn');
        const aiChoiceBtn = document.getElementById('ai-choice-btn');
        const backToManualBtn = document.getElementById('back-to-manual-btn');
        const difficultyButtons = document.querySelectorAll('.difficulty-btn');
        const hintText = document.getElementById('hint-text');
        const wordDisplay = document.getElementById('word-display');
        const keyboard = document.getElementById('keyboard');
        const wrongLettersDisplay = document.getElementById('wrong-letters');
        const gameOverModal = document.getElementById('game-over-modal');
        const modalTitle = document.getElementById('modal-title');
        const modalText = document.getElementById('modal-text');
        const playAgainBtn = document.getElementById('play-again-btn');

        // --- VARIÁVEIS DO JOGO ---
        const hangmanParts = ['head', 'body', 'left-arm', 'right-arm', 'left-leg', 'right-leg'];
        let secretWord = '';
        let hint = '';
        let correctLetters = [];
        let wrongLetters = [];
        const maxWrongGuesses = hangmanParts.length;

        // --- FUNÇÕES ---
        function startGame(word, gameHint) {
            secretWord = word.toUpperCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
            hint = gameHint;
            correctLetters = [];
            wrongLetters = [];
            setupScreen.classList.add('hidden');
            gameScreen.classList.remove('hidden');
            gameScreen.classList.add('fade-in');
            hintText.textContent = hint;
            displayWord();
            createKeyboard();
            updateWrongLetters();
            updateHangman();
        }

        function startManualGame() {
            const word = secretWordInput.value;
            const hint = hintInput.value;
            if (!word || !hint) {
                alert('Por favor, preencha a palavra secreta e a dica para começar!');
                return;
            }
            secretWordInput.value = '';
            hintInput.value = '';
            startGame(word, hint);
        }

        async function startGameWithAI(difficulty) {
            manualInputContainer.classList.add('hidden');
            aiDifficultyContainer.classList.add('hidden');
            loadingIndicator.classList.remove('hidden');
            loadingIndicator.classList.add('flex');
            
            // IMPORTANTE: Cole sua chave de API do Gemini aqui!
            const userApiKey = "AIzaSyDegiNCeqQ_ximsRoZrJA_94Uxa2fCuYxk"; 
            
            if (userApiKey === "COLE_SUA_CHAVE_API_AQUI") {
                 alert("Por favor, adicione sua chave de API do Gemini no código-fonte para a IA funcionar.");
                 showManualInput();
                 loadingIndicator.classList.add('hidden');
                 loadingIndicator.classList.remove('flex');
                 return;
            }

            try {
                const prompt = `Gere uma palavra ou frase para um jogo da forca em português do Brasil. A dificuldade deve ser ${difficulty}. Forneça também uma dica curta e inteligente para a palavra/frase.`;
                const chatHistory = [{ role: "user", parts: [{ text: prompt }] }];
                const payload = {
                    contents: chatHistory,
                    generationConfig: {
                        responseMimeType: "application/json",
                        responseSchema: {
                            type: "OBJECT",
                            properties: {
                                word: { "type": "STRING", "description": "A palavra ou frase secreta." },
                                hint: { "type": "STRING", "description": "A dica para a palavra." }
                            },
                            required: ["word", "hint"]
                        }
                    }
                };
                
                const apiUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-05-20:generateContent?key=${userApiKey}`;
                
                const response = await fetch(apiUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                if (!response.ok) throw new Error(`Erro na API: ${response.statusText}`);
                const result = await response.json();
                if (result.candidates && result.candidates[0].content.parts[0].text) {
                    const data = JSON.parse(result.candidates[0].content.parts[0].text);
                    startGame(data.word, data.hint);
                } else {
                    throw new Error("Resposta da IA inválida.");
                }
            } catch (error) {
                console.error("Erro ao buscar palavra da IA:", error);
                alert("Não foi possível obter uma palavra da IA. Verifique sua chave de API e a conexão com a internet.");
                showManualInput();
            } finally {
                loadingIndicator.classList.add('hidden');
                loadingIndicator.classList.remove('flex');
            }
        }

        function showAiDifficultySelection() {
            manualInputContainer.classList.add('hidden');
            aiDifficultyContainer.classList.remove('hidden');
            aiDifficultyContainer.classList.add('fade-in');
        }

        function showManualInput() {
            aiDifficultyContainer.classList.add('hidden');
            manualInputContainer.classList.remove('hidden');
            manualInputContainer.classList.add('fade-in');
        }

        function createKeyboard() {
            keyboard.innerHTML = '';
            'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('').forEach(letter => {
                const button = document.createElement('button');
                button.textContent = letter;
                button.className = 'bg-gray-700 hover:bg-cyan-500 hover:text-gray-900 font-bold py-3 px-2 text-lg rounded-lg transition-all duration-200 transform hover:scale-110 disabled:bg-gray-600 disabled:opacity-50 disabled:cursor-not-allowed';
                button.addEventListener('click', () => handleGuess(letter));
                keyboard.appendChild(button);
            });
        }

        function displayWord() {
            wordDisplay.innerHTML = secretWord
                .split('')
                .map(char => {
                    if (char === ' ') return `<div class="w-8 h-12"></div>`;
                    const isRevealed = correctLetters.includes(char);
                    return `
                        <div class="flex flex-col items-center">
                            <span class="text-3xl md:text-5xl font-bold w-10 h-16 flex items-center justify-center">
                                ${isRevealed ? char : ''}
                            </span>
                            <div class="w-10 md:w-12 h-2 ${isRevealed ? 'bg-transparent' : 'bg-cyan-400'} rounded-full"></div>
                        </div>`;
                }).join('');
            checkWinCondition();
        }

        function handleGuess(letter) {
            const button = Array.from(keyboard.getElementsByTagName('button')).find(btn => btn.textContent === letter);
            if (button) button.disabled = true;

            if (secretWord.includes(letter)) {
                correctLetters.push(letter);
            } else {
                wrongLetters.push(letter);
                updateWrongLetters();
                updateHangman();
                checkLoseCondition();
            }
            displayWord();
        }

        function updateWrongLetters() {
            wrongLettersDisplay.textContent = wrongLetters.join(' ');
        }

        function updateHangman() {
            hangmanParts.forEach((partId, index) => {
                const partElement = document.getElementById(partId);
                if (index < wrongLetters.length) {
                    partElement.style.display = 'block';
                    partElement.classList.add('fade-in');
                }
            });
        }

        function checkWinCondition() {
            const uniqueLetters = [...new Set(secretWord.replace(/ /g, ''))];
            if (uniqueLetters.length > 0 && uniqueLetters.every(letter => correctLetters.includes(letter))) {
                setTimeout(() => showModal(true), 500);
            }
        }

        function checkLoseCondition() {
            if (wrongLetters.length >= maxWrongGuesses) {
                setTimeout(() => showModal(false), 500);
            }
        }

        function showModal(didWin) {
            gameOverModal.classList.remove('hidden');
            gameOverModal.classList.add('flex');
            if (didWin) {
                modalTitle.textContent = 'Você Venceu!';
                modalTitle.className = 'font-pixel text-4xl mb-4 text-green-400';
                modalText.textContent = 'Parabéns! Você adivinhou a palavra.';
            } else {
                modalTitle.textContent = 'Fim de Jogo!';
                modalTitle.className = 'font-pixel text-4xl mb-4 text-red-400';
                const formattedWord = secretWord.charAt(0) + secretWord.slice(1).toLowerCase();
                modalText.textContent = `Que pena! A palavra era: "${formattedWord}"`;
            }
        }

        function resetGame() {
            gameOverModal.classList.add('hidden');
            gameScreen.classList.add('hidden');
            setupScreen.classList.remove('hidden');
            showManualInput();
            hangmanParts.forEach(partId => {
                const partElement = document.getElementById(partId);
                partElement.style.display = 'none';
                partElement.classList.remove('fade-in');
            });
        }

        // --- EVENT LISTENERS ---
        startGameBtn.addEventListener('click', startManualGame);
        aiChoiceBtn.addEventListener('click', showAiDifficultySelection);
        backToManualBtn.addEventListener('click', showManualInput);
        playAgainBtn.addEventListener('click', resetGame);
        difficultyButtons.forEach(button => {
            button.addEventListener('click', () => {
                const difficulty = button.getAttribute('data-difficulty');
                startGameWithAI(difficulty);
            });
        });
        setupScreen.addEventListener('keyup', (e) => {
            if (e.key === 'Enter' && !manualInputContainer.classList.contains('hidden')) {
                startGameBtn.click();
            }
        });
    </script>
</body>
</html>
