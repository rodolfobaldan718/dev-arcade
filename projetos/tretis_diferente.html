<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tretis Diferente</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Desabilitar seleção e comportamentos padrão de toque na tela do jogo */
        body { margin: 0; padding: 0; background-color: #1a1a2e; overflow: hidden; }
        .touch-none { touch-action: none; }
        .select-none { user-select: none; -webkit-user-select: none; }
    </style>
</head>
<body class="font-sans text-white">

    <div id="aplicacao" class="flex flex-col items-center justify-center min-h-screen select-none touch-none overflow-hidden relative">
        
        <!-- Cabeçalho -->
        <div class="w-full max-w-md flex justify-between items-center mb-6 px-2 z-10">
            <div class="flex items-center gap-2">
                <!-- Ícone de Troféu -->
                <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-yellow-500">
                    <path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/>
                </svg>
                <span id="mostrar-recorde" class="text-2xl font-bold">0</span>
            </div>
            <div id="mostrar-pontuacao" class="text-4xl font-black text-white drop-shadow-md">
                0
            </div>
            <button id="btn-reiniciar" class="p-2 bg-slate-700/50 rounded-full hover:bg-slate-600 transition-colors z-20 relative cursor-pointer">
                <!-- Ícone de Reiniciar -->
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/>
                </svg>
            </button>
        </div>

        <!-- Grelha -->
        <div id="contentor-grelha" class="grid grid-cols-8 gap-1 bg-[#16213e] p-1 rounded-lg shadow-2xl border-4 border-[#0f3460] relative z-10" style="width: 90vw; max-width: 400px; height: 90vw; max-height: 400px;">
            <!-- Células geradas via JS -->
        </div>

        <!-- Espaços para Peças -->
        <div id="contentor-pecas" class="flex justify-around items-center w-full max-w-md mt-10 h-32 z-10">
            <!-- Peças geradas via JS -->
        </div>

        <!-- Peça Fantasma (seguindo o cursor/dedo) -->
        <div id="peca-fantasma" class="fixed pointer-events-none z-50 hidden opacity-90 shadow-xl" style="transform: translate(-50%, -50%) scale(1.1);">
            <!-- Conteúdo gerado via JS -->
        </div>

        <!-- Modal de Fim de Jogo -->
        <div id="modal-fim-de-jogo" class="fixed inset-0 bg-black/80 items-center justify-center z-[100] backdrop-blur-sm hidden flex">
            <div class="bg-[#16213e] p-8 rounded-2xl text-center border-4 border-pink-500 shadow-[0_0_20px_rgba(236,72,153,0.5)] transform transition-transform scale-100 duration-300">
                <h2 class="text-4xl font-black mb-2 text-pink-500">FIM DE JOGO</h2>
                <p class="text-xl mb-6 text-slate-300">A pontuação final foi de:</p>
                <div id="pontuacao-final" class="text-6xl font-bold mb-8">0</div>
                <button id="btn-jogar-novamente" class="flex items-center gap-3 bg-pink-500 hover:bg-pink-600 px-8 py-4 rounded-full font-bold text-xl shadow-lg transition-transform active:scale-95 mx-auto">
                    <!-- Ícone de Play -->
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polygon points="6 3 20 12 6 21 6 3"/>
                    </svg>
                    TENTAR NOVAMENTE
                </button>
            </div>
        </div>

    </div>

    <script>
        // --- Configurações e Constantes ---
        const TAMANHO_GRELHA = 8;
        const CORES = [
            'bg-pink-500 shadow-[inset_-4px_-4px_rgba(0,0,0,0.2)]',
            'bg-purple-500 shadow-[inset_-4px_-4px_rgba(0,0,0,0.2)]',
            'bg-blue-500 shadow-[inset_-4px_-4px_rgba(0,0,0,0.2)]',
            'bg-emerald-500 shadow-[inset_-4px_-4px_rgba(0,0,0,0.2)]',
            'bg-orange-500 shadow-[inset_-4px_-4px_rgba(0,0,0,0.2)]'
        ];

        const TIPOS_DE_PECA = [
            { forma: [[1]], indiceCor: 0 }, // 1x1
            { forma: [[1, 1], [1, 1]], indiceCor: 1 }, // 2x2
            { forma: [[1, 1, 1]], indiceCor: 2 }, // 3x1
            { forma: [[1], [1], [1]], indiceCor: 2 }, // 1x3
            { forma: [[1, 1], [1, 0]], indiceCor: 3 }, // L pequeno
            { forma: [[1, 1, 1], [1, 0, 0], [1, 0, 0]], indiceCor: 3 }, // L grande
            { forma: [[1, 1, 1], [0, 1, 0]], indiceCor: 4 }, // T
            { forma: [[1, 1], [1, 1], [1, 1]], indiceCor: 1 }, // 2x3
            { forma: [[1, 1, 1], [1, 1, 1]], indiceCor: 1 }, // 3x2
        ];

        // --- Estado do Jogo ---
        let grelha = [];
        let pecas = [];
        let pontuacao = 0;
        let recorde = parseInt(localStorage.getItem('blockPuzzleRecorde') || '0');
        let fimDeJogo = false;
        
        let pecaArrastada = null;
        let aArrastar = false;
        let posicaoArrasto = { x: 0, y: 0 };

        // --- Elementos do DOM ---
        const contentorGrelha = document.getElementById('contentor-grelha');
        const contentorPecas = document.getElementById('contentor-pecas');
        const elementoPecaFantasma = document.getElementById('peca-fantasma');
        const mostrarPontuacao = document.getElementById('mostrar-pontuacao');
        const mostrarRecorde = document.getElementById('mostrar-recorde');
        const modalFimDeJogo = document.getElementById('modal-fim-de-jogo');
        const mostrarPontuacaoFinal = document.getElementById('pontuacao-final');
        const contentorApp = document.getElementById('aplicacao');

        // --- Lógica Principal ---
        function iniciarJogo() {
            grelha = Array(TAMANHO_GRELHA).fill().map(() => Array(TAMANHO_GRELHA).fill(null));
            pecas = gerarNovasPecas(grelha);
            pontuacao = 0;
            fimDeJogo = false;
            
            atualizarUIPontuacao();
            mostrarRecorde.textContent = recorde;
            modalFimDeJogo.classList.add('hidden');
            
            renderizarGrelha();
            renderizarPecas();
        }

        function verificarSePecaCabeEmAlgumLugar(forma, grelhaAtual) {
            if (!grelhaAtual) return true;
            for (let l = 0; l < TAMANHO_GRELHA; l++) {
                for (let c = 0; c < TAMANHO_GRELHA; c++) {
                    if (podeColocar(forma, l, c, grelhaAtual)) return true;
                }
            }
            return false;
        }

        function gerarNovasPecas(grelhaAtual) {
            let novasPecas = [];
            
            // Contar células vazias para saber se a grelha está muito cheia
            let celulasVazias = 0;
            if (grelhaAtual) {
                for (let l = 0; l < TAMANHO_GRELHA; l++) {
                    for (let c = 0; c < TAMANHO_GRELHA; c++) {
                        if (grelhaAtual[l][c] === null) celulasVazias++;
                    }
                }
            }

            // Gerar 3 peças
            for (let i = 0; i < 3; i++) {
                let tiposPossiveis = TIPOS_DE_PECA;
                
                // Se a grelha estiver a ficar cheia (< 25 células vazias), aumentar a probabilidade de peças mais pequenas
                if (celulasVazias > 0 && celulasVazias < 25) {
                    const pecasPequenas = TIPOS_DE_PECA.filter(p => p.forma.length * p.forma[0].length <= 4);
                    if (Math.random() < 0.6) { // 60% de hipótese de forçar uma peça mais pequena
                        tiposPossiveis = pecasPequenas;
                    }
                }
                
                const tipo = tiposPossiveis[Math.floor(Math.random() * tiposPossiveis.length)];
                novasPecas.push({ ...tipo, id: Math.random().toString(36).substr(2, 9) });
            }

            // LÓGICA DE AJUDA: Garantir que pelo menos UMA das peças geradas cabe na grelha
            if (grelhaAtual) {
                let algumaPodeSerColocada = false;
                for (let peca of novasPecas) {
                    if (verificarSePecaCabeEmAlgumLugar(peca.forma, grelhaAtual)) {
                        algumaPodeSerColocada = true;
                        break;
                    }
                }

                // Se nenhuma das 3 couber, procuramos uma que caiba para "salvar" o jogador
                if (!algumaPodeSerColocada) {
                    let tiposEmbaralhados = [...TIPOS_DE_PECA].sort(() => Math.random() - 0.5);
                    // Prioridade máxima para o bloco 1x1 num momento de aperto
                    tiposEmbaralhados.unshift(TIPOS_DE_PECA[0]); 
                    
                    for (let tipo of tiposEmbaralhados) {
                        if (verificarSePecaCabeEmAlgumLugar(tipo.forma, grelhaAtual)) {
                            // Substitui uma das peças (aleatória) por esta que cabe
                            let indiceParaSubstituir = Math.floor(Math.random() * 3);
                            novasPecas[indiceParaSubstituir] = { ...tipo, id: Math.random().toString(36).substr(2, 9) };
                            break;
                        }
                    }
                }
            }

            return novasPecas;
        }

        function atualizarPontuacao(pontos) {
            pontuacao += pontos;
            if (pontuacao > recorde) {
                recorde = pontuacao;
                localStorage.setItem('blockPuzzleRecorde', recorde.toString());
                mostrarRecorde.textContent = recorde;
            }
            atualizarUIPontuacao();
        }

        function atualizarUIPontuacao() {
            mostrarPontuacao.textContent = pontuacao;
            mostrarPontuacaoFinal.textContent = pontuacao;
        }

        // --- Renderização ---
        function renderizarGrelha() {
            contentorGrelha.innerHTML = '';
            for (let l = 0; l < TAMANHO_GRELHA; l++) {
                for (let c = 0; c < TAMANHO_GRELHA; c++) {
                    const celula = document.createElement('div');
                    celula.className = `aspect-square rounded-sm transition-all duration-300 ${grelha[l][c] ? grelha[l][c] : 'bg-[#1a1a2e]/60'}`;
                    contentorGrelha.appendChild(celula);
                }
            }
        }

        function renderizarPecas() {
            contentorPecas.innerHTML = '';
            pecas.forEach(peca => {
                const envoltorioPeca = document.createElement('div');
                envoltorioPeca.className = `flex items-center justify-center cursor-grab active:cursor-grabbing transition-transform scale-75`;
                envoltorioPeca.id = `peca-${peca.id}`;
                
                const grelhaPeca = document.createElement('div');
                grelhaPeca.className = 'grid gap-0.5 pointer-events-none';
                grelhaPeca.style.gridTemplateColumns = `repeat(${peca.forma[0].length}, 1fr)`;

                peca.forma.forEach(linha => {
                    linha.forEach(valor => {
                        const bloco = document.createElement('div');
                        bloco.className = `w-8 h-8 rounded-sm ${valor === 1 ? CORES[peca.indiceCor] : 'opacity-0'}`;
                        grelhaPeca.appendChild(bloco);
                    });
                });

                envoltorioPeca.appendChild(grelhaPeca);
                
                // Eventos de início de arrasto na peça
                const manipuladorInicioArrasto = (e) => aoIniciarArrasto(peca, e);
                envoltorioPeca.addEventListener('mousedown', manipuladorInicioArrasto);
                envoltorioPeca.addEventListener('touchstart', manipuladorInicioArrasto, { passive: false });

                contentorPecas.appendChild(envoltorioPeca);
            });
        }

        function atualizarPecaFantasma() {
            if (!pecaArrastada) return;
            
            elementoPecaFantasma.innerHTML = '';
            const grelhaPeca = document.createElement('div');
            grelhaPeca.className = 'grid gap-0.5';
            grelhaPeca.style.gridTemplateColumns = `repeat(${pecaArrastada.forma[0].length}, 1fr)`;

            pecaArrastada.forma.forEach(linha => {
                linha.forEach(valor => {
                    const bloco = document.createElement('div');
                    bloco.className = `w-10 h-10 rounded-sm ${valor === 1 ? CORES[pecaArrastada.indiceCor] : 'opacity-0'}`;
                    grelhaPeca.appendChild(bloco);
                });
            });

            elementoPecaFantasma.appendChild(grelhaPeca);
        }

        // --- Lógica de Colocação ---
        function podeColocar(forma, linha, coluna, grelhaAtual) {
            for (let l = 0; l < forma.length; l++) {
                for (let c = 0; c < forma[l].length; c++) {
                    if (forma[l][c] === 1) {
                        const alvoL = linha + l;
                        const alvoC = coluna + c;
                        if (
                            alvoL < 0 || alvoL >= TAMANHO_GRELHA ||
                            alvoC < 0 || alvoC >= TAMANHO_GRELHA ||
                            grelhaAtual[alvoL][alvoC] !== null
                        ) {
                            return false;
                        }
                    }
                }
            }
            return true;
        }

        function verificarEstadoFimDeJogo(pecasAtuais, grelhaAtual) {
            if (pecasAtuais.length === 0) return false;
            for (const peca of pecasAtuais) {
                for (let l = 0; l < TAMANHO_GRELHA; l++) {
                    for (let c = 0; c < TAMANHO_GRELHA; c++) {
                        if (podeColocar(peca.forma, l, c, grelhaAtual)) return false;
                    }
                }
            }
            return true;
        }

        function processarLargada(peca, x, y) {
            const retangulo = contentorGrelha.getBoundingClientRect();
            const tamanhoCelula = retangulo.width / TAMANHO_GRELHA;
            
            const larguraPeca = peca.forma[0].length * tamanhoCelula;
            const alturaPeca = peca.forma.length * tamanhoCelula;
            
            const coluna = Math.round((x - retangulo.left - larguraPeca / 2) / tamanhoCelula);
            const linha = Math.round((y - retangulo.top - alturaPeca / 2) / tamanhoCelula);

            if (podeColocar(peca.forma, linha, coluna, grelha)) {
                let celulasColocadas = 0;

                peca.forma.forEach((linhaMatriz, indLinha) => {
                    linhaMatriz.forEach((valor, indColuna) => {
                        if (valor === 1) {
                            grelha[linha + indLinha][coluna + indColuna] = CORES[peca.indiceCor];
                            celulasColocadas++;
                        }
                    });
                });

                // Verificar linhas e colunas
                let linhasALimpar = [];
                let colunasALimpar = [];

                for (let i = 0; i < TAMANHO_GRELHA; i++) {
                    if (grelha[i].every(celula => celula !== null)) linhasALimpar.push(i);
                    let colunaCheia = true;
                    for (let l = 0; l < TAMANHO_GRELHA; l++) {
                        if (grelha[l][i] === null) colunaCheia = false;
                    }
                    if (colunaCheia) colunasALimpar.push(i);
                }

                const pontos = celulasColocadas + (linhasALimpar.length + colunasALimpar.length) * 10;
                
                linhasALimpar.forEach(l => grelha[l].fill(null));
                colunasALimpar.forEach(c => {
                    for (let l = 0; l < TAMANHO_GRELHA; l++) grelha[l][c] = null;
                });

                pecas = pecas.filter(p => p.id !== peca.id);
                if (pecas.length === 0) {
                    pecas = gerarNovasPecas(grelha);
                }
                
                renderizarGrelha();
                renderizarPecas();
                atualizarPontuacao(pontos);

                if (verificarEstadoFimDeJogo(pecas, grelha)) {
                    fimDeJogo = true;
                    modalFimDeJogo.classList.remove('hidden');
                }
            } else {
                // Se não colocou, a peça original volta a ficar visível
                const elementoPecaOriginal = document.getElementById(`peca-${peca.id}`);
                if (elementoPecaOriginal) elementoPecaOriginal.classList.remove('opacity-0');
            }
        }

        // --- Eventos de Arrasto (Drag & Drop) ---
        function aoIniciarArrasto(peca, e) {
            if (fimDeJogo) return;
            pecaArrastada = peca;
            aArrastar = true;
            
            const clienteX = e.touches ? e.touches[0].clientX : e.clientX;
            const clienteY = e.touches ? e.touches[0].clientY : e.clientY;
            
            // Ocultar a peça original no espaço
            const elementoPecaOriginal = document.getElementById(`peca-${peca.id}`);
            if (elementoPecaOriginal) elementoPecaOriginal.classList.add('opacity-0');

            atualizarPecaFantasma();
            elementoPecaFantasma.classList.remove('hidden');
            
            atualizarPosicaoFantasma(clienteX, clienteY, !!e.touches);
        }

        function aoMoverArrasto(e) {
            if (!aArrastar || !pecaArrastada) return;
            e.preventDefault(); // Impede o scroll no telemóvel enquanto arrasta
            
            const clienteX = e.touches ? e.touches[0].clientX : e.clientX;
            const clienteY = e.touches ? e.touches[0].clientY : e.clientY;
            
            atualizarPosicaoFantasma(clienteX, clienteY, !!e.touches);
        }

        function atualizarPosicaoFantasma(x, y, heToque) {
            const deslocamentoY = heToque ? -60 : 0;
            posicaoArrasto = { x, y: y + deslocamentoY };
            
            elementoPecaFantasma.style.left = `${posicaoArrasto.x}px`;
            elementoPecaFantasma.style.top = `${posicaoArrasto.y}px`;
        }

        function aoTerminarArrasto(e) {
            if (!aArrastar || !pecaArrastada) return;
            
            elementoPecaFantasma.classList.add('hidden');
            
            // O processarLargada verifica se cabe e toma ações. Se não couber, ele torna a peça original visível novamente.
            processarLargada(pecaArrastada, posicaoArrasto.x, posicaoArrasto.y);
            
            aArrastar = false;
            pecaArrastada = null;
        }

        // Adição de Eventos Globais
        contentorApp.addEventListener('mousemove', aoMoverArrasto);
        contentorApp.addEventListener('mouseup', aoTerminarArrasto);
        contentorApp.addEventListener('touchmove', aoMoverArrasto, { passive: false });
        contentorApp.addEventListener('touchend', aoTerminarArrasto);
        contentorApp.addEventListener('touchcancel', aoTerminarArrasto);

        // Botões
        document.getElementById('btn-reiniciar').addEventListener('click', iniciarJogo);
        document.getElementById('btn-jogar-novamente').addEventListener('click', iniciarJogo);

        // --- Iniciar ---
        window.addEventListener('DOMContentLoaded', iniciarJogo);

    </script>
</body>
</html>
